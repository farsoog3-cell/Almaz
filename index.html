<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | المتجر الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* شاشة التحميل */
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: 3rem; font-weight: 900; animation: bounce 1.5s infinite; }

        /* شارة الخصم */
        .discount-badge { position: absolute; top: 12px; left: 12px; background: #ff3b30; color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 20; box-shadow: 0 4px 10px rgba(255,59,48,0.3); }

        /* السلايدر */
        .slider-container { width: 95%; max-width: 1200px; margin: 10px auto 25px; position: relative; overflow: hidden; border-radius: 20px; aspect-ratio: 16/8; background: #000; border: 1px solid var(--border-color); }
        .slider-track { display: flex; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* الأقسام والبحث */
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px 45px 14px 20px; border-radius: 18px; color: white; outline: none; }
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { white-space: nowrap; padding: 10px 20px; border-radius: 99px; font-size: 0.8rem; background: var(--card-bg); border: 1px solid var(--border-color); color: #aaa; transition: 0.3s; }
        .category-btn.active { background: var(--primary); color: black; font-weight: 900; }

        /* كرت المنتج */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); padding: 10px; position: relative; transition: 0.3s; }
        
        .option-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .option-dot.selected { border-color: white; box-shadow: 0 0 10px var(--primary); }
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 8px; font-size: 11px; transition: 0.2s; }
        .size-btn.selected { background: white; color: black; font-weight: 900; }

        /* الشريط العلوي */
        .marquee { background: var(--primary); height: 28px; position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; overflow: hidden; font-size: 0.75rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollText 20s linear infinite; }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* عارض الصور */
        #gallery-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="pt-12 pb-10">

    <div id="splash-screen"><div class="splash-logo italic">AL<span class="text-[#00BFFF]">MAZ</span></div></div>

    <div class="marquee"><div id="marquee-text" class="marquee-content">✨ أهلاً بكم في متجر الماس - عروض حصرية لفترة محدودة ✨</div></div>

    <header class="mx-auto px-4 py-3 sticky top-8 z-40 bg-zinc-800/80 backdrop-blur-lg rounded-2xl border border-white/5 flex justify-between items-center max-w-[94%] shadow-xl">
        <div class="text-xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button onclick="toggleCart()" class="relative p-2.5 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4.5 h-4.5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div class="px-4 mt-6">
        <div class="relative max-w-xl mx-auto">
            <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00BFFF] w-5 h-5"></i>
            <input type="text" id="main-search" oninput="doSearch()" class="search-bar" placeholder="ابحث عن منتجك المفضل...">
        </div>
    </div>

    <section id="slider-area" class="hidden">
        <div class="slider-container">
            <div id="slider-track" class="slider-track"></div>
        </div>
    </section>

    <main class="px-4">
        <div class="category-scroll no-scrollbar">
            <button onclick="filterBy('all', this)" class="category-btn active">الكل</button>
            <button onclick="filterBy('men_shoes', this)" class="category-btn">أحذية رجالي</button>
            <button onclick="filterBy('women_shoes', this)" class="category-btn">أحذية نسائي</button>
            <button onclick="filterBy('sport_shoes', this)" class="category-btn">أحذية رياضية</button>
        </div>
        <div id="products-grid" class="product-grid mt-6"></div>
    </main>

    <div id="cart-drawer" class="fixed inset-y-0 left-0 w-full md:w-[400px] bg-zinc-900 z-[3000] translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-xl font-black text-[#00BFFF]">حقيبة التسوق</h2>
            <button onclick="toggleCart()" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items-list" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-4 font-black text-xl"><span>الإجمالي:</span><span id="cart-total-price" class="text-[#00BFFF]">$0</span></div>
            <button onclick="sendOrder()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black">إرسال الطلب واتساب ✅</button>
        </div>
    </div>

    <div id="gallery-viewer" onclick="this.style.display='none'">
        <img id="viewer-img-src" class="max-w-[90%] max-h-[80vh] rounded-2xl object-contain">
        <p class="text-gray-400 mt-4 text-sm">اضغط في أي مكان للإغلاق</p>
    </div>

    <script>
        let allProducts = [], cart = [];
        window.userSelections = {};

        async function startApp() {
            try {
                const [setRes, sliRes, proRes] = await Promise.all([
                    fetch('settings.json?v=' + Date.now()),
                    fetch('slides.json?v=' + Date.now()),
                    fetch('products.json?v=' + Date.now())
                ]);

                const settings = await setRes.json();
                document.getElementById('marquee-text').innerText = settings.marquee;

                const slides = await sliRes.json();
                if(slides.length > 0) {
                    const track = document.getElementById('slider-track');
                    slides.forEach(s => track.innerHTML += `<div class="slide"><img src="${s.image}"></div>`);
                    document.getElementById('slider-area').classList.remove('hidden');
                    let cur = 0; setInterval(() => { cur = (cur + 1) % slides.length; track.style.transform = `translateX(${cur * 100}%)`; }, 4000);
                }

                allProducts = await proRes.json();
                displayProducts(allProducts);
            } catch (e) { console.error("Error loading data"); }
        }

        function displayProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                if (!window.userSelections[p.id]) window.userSelections[p.id] = { color: p.colors?.[0]||'', size: p.sizes?.[0]||'', qty: 1 };
                
                const discount = p.oldPrice && p.oldPrice > p.price ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
                const imgUrl = Array.isArray(p.image) ? p.image[0] : p.image;

                grid.innerHTML += `
                    <div class="product-card">
                        ${discount > 0 ? `<div class="discount-badge">-${discount}%</div>` : ''}
                        <img src="${imgUrl}" onclick="showGallery('${imgUrl}')" class="w-full h-44 object-cover rounded-xl mb-3 cursor-pointer">
                        <h3 class="font-bold text-[11px] mb-1 truncate">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[#00BFFF] font-black text-sm">$${p.price}</span>
                            ${p.oldPrice ? `<span class="text-gray-500 line-through text-[10px]">$${p.oldPrice}</span>` : ''}
                        </div>
                        <div class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar">
                            ${(p.colors||[]).map(c => `<div onclick="setOption(${p.id},'color','${c}',this)" class="option-dot ${window.userSelections[p.id].color===c?'selected':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1 mb-4">
                            ${(p.sizes||[]).map(s => `<button onclick="setOption(${p.id},'size','${s}',this)" class="size-btn ${window.userSelections[p.id].size===s?'selected':''}">${s}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-3 rounded-xl font-black text-[10px]">إضافة للسلة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.setOption = (id, type, val, el) => {
            window.userSelections[id][type] = val;
            el.parentElement.querySelectorAll('.option-dot, .size-btn').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.addToCart = (id) => {
            const p = allProducts.find(x => x.id === id);
            const s = window.userSelections[id];
            cart.push({...p, ...s, cartId: Date.now()});
            refreshCart();
            toggleCart(true);
        };

        function refreshCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            let total = 0; list.innerHTML = '';
            cart.forEach(i => {
                total += i.price;
                list.innerHTML += `<div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center border border-white/5">
                    <img src="${Array.isArray(i.image)?i.image[0]:i.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow"><p class="text-[10px] font-bold">${i.name}</p><p class="text-[9px] text-gray-400">مقاس: ${i.size} | لون: ${i.color}</p></div>
                    <button onclick="removeItem(${i.cartId})" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            });
            document.getElementById('cart-total-price').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeItem = (cid) => { cart = cart.filter(x => x.cartId !== cid); refreshCart(); };

        window.toggleCart = (forceOpen = false) => {
            const drawer = document.getElementById('cart-drawer');
            if (forceOpen) drawer.classList.remove('translate-x-full');
            else drawer.classList.toggle('translate-x-full');
        };

        window.doSearch = () => {
            const term = document.getElementById('main-search').value.toLowerCase();
            displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        };

        window.filterBy = (cat, btn) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts(cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat));
        };

        window.showGallery = (u) => {
            document.getElementById('viewer-img-src').src = u;
            document.getElementById('gallery-viewer').style.display = 'flex';
        };

        window.sendOrder = () => {
            if(!cart.length) return;
            let msg = "🚀 *طلب جديد من متجر الماس*\n\n";
            cart.forEach(p => msg += `• ${p.name} (مقاس: ${p.size})\n`);
            msg += `\n💰 الإجمالي: ${document.getElementById('cart-total-price').innerText}`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        };

        window.onload = () => { startApp(); setTimeout(() => document.getElementById('splash-screen').style.display='none', 2000); };
    </script>
</body>
</html>
