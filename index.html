<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | المتجر المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); --accent-red: #ff4d4d; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: 3rem; font-weight: 900; color: white; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        /* تحديث شريط الإعلانات - حركة من اليسار لليمين وتصميم أجمل */
        .marquee { 
            background: linear-gradient(90deg, #00BFFF, #0080ff); 
            height: 32px; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            font-size: 0.8rem; 
            font-weight: 800; 
            color: black;
            box-shadow: 0 2px 10px rgba(0, 191, 255, 0.3);
        }
        .marquee-content { 
            white-space: nowrap; 
            display: inline-block;
            animation: scrollLeftToRight 20s linear infinite; 
        }
        /* أنيميشن من اليسار إلى اليمين */
        @keyframes scrollLeftToRight { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(100%); } 
        }

        .live-status-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .live-status { 
            display: inline-flex; 
            align-items: center; 
            background: rgba(0, 191, 255, 0.05); 
            border: 1px solid rgba(0, 191, 255, 0.2); 
            padding: 8px 18px; 
            border-radius: 50px; 
            gap: 8px; 
            backdrop-filter: blur(10px);
        }
        .pulse-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; position: relative; box-shadow: 0 0 10px var(--primary); }
        .pulse-dot::after { content: ''; position: absolute; inset: -4px; border: 2px solid var(--primary); border-radius: 50%; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .discount-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--accent-red);
            color: white;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 900;
            z-index: 40;
            border-radius: 0 12px 0 12px;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.3);
        }

        #music-control { position: fixed; bottom: 100px; left: 20px; z-index: 90; background: var(--primary); color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--primary); cursor: pointer; transition: 0.3s; opacity: 0; }
        #music-control.visible { opacity: 1; }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); padding: 10px; display: flex; flex-direction: column; height: 100%; transition: 0.3s; position: relative; overflow: hidden; }
        
        .option-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .option-dot.selected { border-color: white; box-shadow: 0 0 8px var(--primary); }
        
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 8px; font-size: 10px; transition: 0.2s; cursor: pointer; }
        .size-btn.selected { background: var(--primary); color: black; font-weight: 900; }

        .slider-container { width: 95%; max-width: 1200px; margin: 15px auto 25px; position: relative; overflow: hidden; border-radius: 20px; aspect-ratio: 16/9; border: 1px solid var(--border-color); background: #000; }
        .slider-track { display: flex; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; width: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: cover; }

        .category-btn { white-space: nowrap; padding: 10px 24px; border-radius: 99px; font-size: 0.85rem; background: var(--card-bg); border: 1px solid var(--border-color); color: #aaa; transition: 0.3s; }
        .category-btn.active { background: var(--primary); color: black; font-weight: 900; }
        
        #image-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        #modal-main-img { max-height: 70vh; max-width: 100%; border-radius: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-12 text-center">

    <div id="splash-screen">
        <div class="splash-logo italic">AL<span>MAZ</span></div>
    </div>

    <div class="marquee">
        <div id="marquee-text" class="marquee-content">✨ أهلاً بكم في Almaz Store - شحن سريع لجميع الولايات ✨ خصومات حصرية تصل إلى 50% بمناسبة الافتتاح ✨</div>
    </div>

    <div id="music-control" onclick="toggleMusic()">
        <i data-lucide="music" id="music-icon" class="w-5 h-5"></i>
    </div>

    <header class="mx-auto px-4 py-3 sticky top-10 z-50 bg-zinc-800/90 backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center max-w-[94%] shadow-2xl">
        <div class="text-xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div class="px-5 mt-8">
        <div class="live-status-container">
            <div class="live-status">
                <span class="pulse-dot"></span>
                <i data-lucide="users" class="w-4 h-4 text-[#00BFFF]"></i>
                <span id="visitor-count" class="text-[#00BFFF] font-black text-sm">12</span>
                <span class="text-[11px] font-medium text-gray-400">يتسوقون الآن</span>
            </div>
        </div>

        <div class="relative max-w-xl mx-auto">
            <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
            <input type="text" id="search-input" class="w-full bg-zinc-900 border border-white/10 p-4 pr-11 rounded-2xl text-sm outline-none focus:border-[#00BFFF] transition-all text-right shadow-inner" placeholder="ابحث عن منتج..." oninput="handleSearch()">
        </div>
    </div>

    <section id="slider-section" class="hidden">
        <div class="slider-container">
            <div id="slider-track" class="slider-track"></div>
        </div>
    </section>

    <main class="px-4 text-right">
        <div class="category-scroll flex gap-2 overflow-x-auto no-scrollbar py-6">
            <button onclick="filterProducts('all', event)" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_shoes', event)" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes', event)" class="category-btn">أحذية نسائي</button>
            <button onclick="filterProducts('men_clothing', event)" class="category-btn">ملابس رجالي</button>
        </div>
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-2 mb-28"></div>
    </main>

    <script>
        // الكود البرمجي السابق يوضع هنا بالكامل
        let productsData = [], cart = [], bgMusic = null;
        window.tempSelections = {};

        async function init() {
            try {
                updateVisitors();
                await Promise.all([loadSettings(), loadSlides(), loadProducts()]);
            } finally {
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
                }, 1000);
            }
        }

        function updateVisitors() {
            const countEl = document.getElementById('visitor-count');
            let count = Math.floor(Math.random() * 23) + 12; 
            countEl.innerText = count;
            setInterval(() => {
                let change = Math.floor(Math.random() * 3) - 1;
                count = Math.max(10, Math.min(50, count + change));
                countEl.innerText = count;
            }, 5000);
        }

        async function loadSettings() {
            try {
                const res = await fetch('settings.json?v=' + Date.now());
                const data = await res.json();
                if(data.marquee) document.getElementById('marquee-text').innerText = data.marquee;
                if(data.music) {
                    bgMusic = new Audio(data.music);
                    bgMusic.loop = true;
                    document.getElementById('music-control').classList.add('visible');
                    const startMusic = () => { bgMusic.play(); updateMusicIcon(true); document.removeEventListener('click', startMusic); };
                    document.addEventListener('click', startMusic);
                }
            } catch (e) {}
        }

        function toggleMusic() {
            if(!bgMusic) return;
            if(bgMusic.paused) { bgMusic.play(); updateMusicIcon(true); } else { bgMusic.pause(); updateMusicIcon(false); }
        }

        function updateMusicIcon(isPlaying) {
            const icon = document.getElementById('music-icon');
            icon.setAttribute('data-lucide', isPlaying ? 'volume-2' : 'volume-x');
            lucide.createIcons();
        }

        async function loadSlides() {
            try {
                const res = await fetch('slides.json?v=' + Date.now());
                const slides = await res.json();
                if (slides?.length) {
                    const track = document.getElementById('slider-track');
                    document.getElementById('slider-section').classList.remove('hidden');
                    track.innerHTML = slides.map(s => `
                        <div class="slide">
                            ${s.type === 'video' ? 
                                `<video src="${s.image}" class="w-full h-full object-cover" autoplay muted loop playsinline></video>` : 
                                `<img src="${s.image}" class="w-full h-full object-cover">`
                            }
                        </div>`).join('');
                    let cur = 0;
                    setInterval(() => {
                        cur = (cur + 1) % slides.length;
                        track.style.transform = `translateX(${cur * 100}%)`;
                    }, 5000);
                }
            } catch (e) {}
        }

        async function loadProducts() {
            try {
                const res = await fetch('products.json?v=' + Date.now());
                productsData = await res.json();
                renderProducts(productsData);
            } catch (e) {}
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => {
                if (!window.tempSelections[p.id]) {
                    window.tempSelections[p.id] = { color: p.colors?.[0] || '', size: p.sizes?.[0] || '', qty: 1 };
                }
                const sel = window.tempSelections[p.id];
                const mainImg = Array.isArray(p.image) ? p.image[0] : p.image;
                return `
                <div class="product-card">
                    ${p.oldPrice > p.price ? `<div class="discount-badge">خصم %${Math.round((p.oldPrice-p.price)/p.oldPrice*100)}</div>` : ''}
                    <div class="relative mb-3 overflow-hidden rounded-xl">
                        <img src="${mainImg}" onclick="openImageModal(${p.id})" class="w-full aspect-square object-cover shadow-md cursor-zoom-in">
                    </div>
                    <div class="flex-grow">
                        <h3 class="text-[12px] font-bold text-gray-200 line-clamp-1 mb-1">${p.name}</h3>
                        <div class="mb-2 flex items-center gap-2">
                            <span class="text-[#00BFFF] font-black text-lg">$${p.price}</span>
                            ${p.oldPrice > p.price ? `<span class="text-gray-500 line-through text-[11px]">$${p.oldPrice}</span>` : ''}
                        </div>
                        <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 mb-1">
                            ${(p.colors || []).map(c => `<div onclick="updateOpt(${p.id},'color','${c}',this)" class="option-dot ${sel.color===c?'selected':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1 mb-3">
                            ${(p.sizes || []).map(s => `<button onclick="updateOpt(${p.id},'size','${s}',this)" class="size-btn ${sel.size===s?'selected':''}">${s}</button>`).join('')}
                        </div>
                    </div>
                    <div class="mt-auto">
                        <div class="flex items-center justify-between bg-black/30 p-2 rounded-xl mb-2">
                            <button onclick="changeQty(${p.id}, -1)" class="qty-btn font-bold px-3 text-[#00BFFF]">-</button>
                            <span id="qty-${p.id}" class="font-bold text-sm">${sel.qty}</span>
                            <button onclick="changeQty(${p.id}, 1)" class="qty-btn font-bold px-3 text-[#00BFFF]">+</button>
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-3 rounded-xl text-[12px] font-black">إضافة للسلة</button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.changeQty = (id, delta) => {
            let s = window.tempSelections[id];
            s.qty = Math.max(1, s.qty + delta);
            document.getElementById(`qty-${id}`).innerText = s.qty;
        };

        window.updateOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll(el.tagName === 'DIV' ? '.option-dot' : '.size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            cart.push({ ...p, ...window.tempSelections[id], cartId: Date.now() });
            updateCartUI();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-content').innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `<div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/5 items-center">
                    <img src="${Array.isArray(item.image) ? item.image[0] : item.image}" class="w-14 h-14 object-cover rounded-xl">
                    <div class="flex-grow text-right">
                        <h4 class="text-[11px] font-bold">${item.name}</h4>
                        <p class="text-[10px] text-gray-500">${item.qty} × ${item.size}</p>
                    </div>
                    <button onclick="removeItem(${item.cartId})" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeItem = (cid) => { cart = cart.filter(x => x.cartId !== cid); updateCartUI(); };

        window.sendOrder = () => {
            if(!cart.length) return;
            let text = "🚀 طلب جديد من Almaz Store:\n\n";
            cart.forEach(it => text += `- ${it.name}\n  الكمية: ${it.qty} | المقاس: ${it.size}\n`);
            text += `\n💰 الإجمالي: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(text)}`);
        };

        window.openImageModal = (id) => {
            const p = productsData.find(x => x.id === id);
            currentModalImages = Array.isArray(p.image) ? p.image : [p.image];
            document.getElementById('image-modal').style.display = 'flex';
            document.getElementById('modal-main-img').src = currentModalImages[0];
            document.getElementById('modal-thumbs').innerHTML = currentModalImages.map(img => `<img src="${img}" class="w-12 h-12 object-cover rounded-md cursor-pointer" onclick="document.getElementById('modal-main-img').src='${img}'">`).join('');
        };

        window.closeImageModal = () => document.getElementById('image-modal').style.display = 'none';

        window.handleSearch = () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(productsData.filter(p => p.name.toLowerCase().includes(q)));
        };

        window.filterProducts = (cat, e) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            renderProducts(cat === 'all' ? productsData : productsData.filter(p => p.category === cat));
        };

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        init();
    </script>
</body>
</html>
