<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almaz | متجر الألماس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --primary: #FF7F00; --bg-dark: #080808; --card-bg: #121212; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; }
        
        #image-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; cursor: zoom-out; }
        #image-modal.active { display: flex; }

        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,127,0,0.5); }

        .size-btn { border: 1px solid #333; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .size-btn.active { background: white; color: black; border-color: white; }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid #222; overflow: hidden; }
        .category-btn { white-space: nowrap; transition: 0.3s; border: 1px solid #333; padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.8rem; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 700; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .marquee-container { background: var(--primary); height: 28px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; }
        .marquee-content { white-space: nowrap; animation: marquee 15s linear infinite; color: black; font-weight: bold; font-size: 0.7rem; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="pt-10">

    <div class="marquee-container">
        <div class="marquee-content uppercase">✨ Almaz Store: تميز بأناقتك • شحن سريع لجميع الولايات • جودة مضمونة ✨</div>
    </div>

    <header class="container mx-auto px-4 py-3 sticky top-8 z-40 bg-black/60 backdrop-blur-md rounded-xl border border-white/10 flex justify-between items-center mt-2 mx-4">
        <div class="text-xl font-black flex items-center gap-1 uppercase">
            <span class="bg-orange-500 text-black px-1.5 py-0.5 rounded">AL</span>maz
        </div>
        <button id="toggle-cart" class="relative p-2 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-bag" class="text-orange-500 w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-black">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-6">
        <section class="text-center mb-6">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Almaz <span class="text-orange-500">Store</span></h1>
            <div id="categories" class="flex overflow-x-auto gap-2 mt-6 pb-2 no-scrollbar justify-start md:justify-center">
                <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
                <button onclick="filterProducts('clothing')" class="category-btn">ملابس</button>
                <button onclick="filterProducts('shoes')" class="category-btn">أحذية</button>
            </div>
        </section>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>
    </main>

    <div id="image-modal" onclick="this.classList.remove('active')">
        <img id="modal-img" src="" class="max-w-[90%] max-h-[80vh] rounded-2xl transition-transform duration-300">
    </div>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[380px] bg-black/95 backdrop-blur-xl z-50 translate-x-full transition-transform duration-300 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
            <h2 class="text-lg font-black uppercase text-orange-500">سلة التسوق</h2>
            <button id="close-cart" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10 mt-auto">
            <div class="flex justify-between mb-4 font-black text-xl">
                <span>الإجمالي:</span>
                <span id="cart-total" class="text-orange-500">₺0</span>
            </div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-orange-500 text-black py-4 rounded-xl font-black flex justify-center gap-2 text-sm uppercase">
                إرسال الطلب عبر الواتساب <i data-lucide="send" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <script>
        const productsData = [
            { id: 1, name: "تيشيرت Almaz قطن", price: 450, category: "clothing", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600", colors: ['#FFFFFF', '#000000'], sizes: ['S', 'M', 'L', 'XL', 'XXL'] },
            { id: 2, name: "حذاء رياضي برو", price: 980, category: "shoes", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600", colors: ['#FF0000', '#000000'], sizes: ['40', '41', '42', '43', '44'] },
            { id: 3, name: "هودي شتوي فاخر", price: 850, category: "clothing", image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600", colors: ['#2F4F4F', '#000000'], sizes: ['M', 'L', 'XL'] },
            { id: 4, name: "سنيكرز أبيض كلاسيك", price: 720, category: "shoes", image: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=600", colors: ['#FFFFFF', '#C0C0C0'], sizes: ['38', '39', '40', '41', '42'] }
        ];

        let cart = [];
        const WHATSAPP_NUMBER = "905394753724";
        window.selectedOptions = {}; // لتخزين اختيارات المستخدم المؤقتة

        lucide.createIcons();

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        function openImage(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').classList.add('active');
        }

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? productsData : productsData.filter(p => p.category === filter);

            filtered.forEach(p => {
                // تعيين القيم الافتراضية
                if (!window.selectedOptions[p.id]) {
                    window.selectedOptions[p.id] = { color: p.colors[0], size: p.sizes[0] };
                }

                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col">
                        <img src="${p.image}" onclick="openImage('${p.image}')" class="w-full h-72 object-cover rounded-2xl mb-4 cursor-pointer hover:scale-[1.02] transition duration-300">
                        
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-lg">${p.name}</h3>
                            <span class="text-orange-500 font-black text-xl">₺${p.price}</span>
                        </div>
                        
                        <p class="text-[10px] text-gray-500 mb-2 uppercase tracking-widest">الألوان المتاحة</p>
                        <div class="flex gap-3 mb-4">
                            ${p.colors.map(c => `
                                <div onclick="selectOption(${p.id}, 'color', '${c}', this)" 
                                     class="color-dot ${window.selectedOptions[p.id].color === c ? 'active' : ''}" 
                                     style="background-color: ${c}">
                                </div>
                            `).join('')}
                        </div>

                        <p class="text-[10px] text-gray-500 mb-2 uppercase tracking-widest">المقاس</p>
                        <div class="flex flex-wrap gap-2 mb-6">
                            ${p.sizes.map(s => `
                                <button onclick="selectOption(${p.id}, 'size', '${s}', this)" 
                                        class="size-btn ${window.selectedOptions[p.id].size === s ? 'active' : ''}">
                                    ${s}
                                </button>
                            `).join('')}
                        </div>

                        <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-orange-500 text-black py-3 rounded-xl font-bold transition hover:bg-orange-400 active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> إضافة للسلة
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function selectOption(prodId, type, value, el) {
            window.selectedOptions[prodId][type] = value;
            
            // تحديث الشكل الخارجي فوراً
            const parent = el.parentElement;
            if (type === 'color') {
                parent.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            } else {
                parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            }
            el.classList.add('active');
        }

        window.addToCart = (id) => {
            const p = productsData.find(prod => prod.id === id);
            const options = window.selectedOptions[id];
            cart.push({ 
                ...p, 
                selectedColor: options.color, 
                selectedSize: options.size,
                cartId: Date.now() 
            });
            updateUI();
            if(window.innerWidth < 768) document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        window.removeFromCart = (cartId) => {
            cart = cart.filter(item => item.cartId !== cartId);
            updateUI();
        };

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            content.innerHTML = cart.length ? '' : '<div class="text-center opacity-20 mt-20"><i data-lucide="shopping-cart" class="w-12 h-12 mx-auto mb-2"></i><p>السلة فارغة</p></div>';
            let total = 0;
            
            cart.forEach(item => {
                total += item.price;
                content.innerHTML += `
                    <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/5 relative">
                        <img src="${item.image}" class="w-16 h-16 rounded-lg object-cover">
                        <div class="flex-grow">
                            <p class="text-sm font-bold">${item.name}</p>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded">مقاس: ${item.selectedSize}</span>
                                <div class="w-3 h-3 rounded-full border border-white/20" style="background-color: ${item.selectedColor}"></div>
                            </div>
                            <p class="text-orange-500 font-bold mt-1 text-sm">₺${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-red-500/50 hover:text-red-500 self-center">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = `₺${total}`;
            lucide.createIcons();
        }

        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderProducts(cat);
        };

        window.sendOrderToWhatsApp = () => {
            if (!cart.length) return;
            let msg = "🚀 *طلب جديد من Almaz Store*\n";
            msg += "--------------------------\n";
            cart.forEach((p, i) => {
                msg += `📦 *${i+1}. ${p.name}*\n   - المقاس: ${p.selectedSize}\n   - اللون: ${p.selectedColor}\n   - السعر: ₺${p.price}\n\n`;
            });
            msg += "--------------------------\n";
            msg += `💰 *الإجمالي: ₺${cart.reduce((a, b) => a + b.price, 0)}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        document.addEventListener('DOMContentLoaded', () => renderProducts('all'));
    </script>
</body>
</html>
