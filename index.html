<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #00BFFF; 
            --bg-dark: #2a2a2a; 
            --card-bg: #333333; 
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Splash Screen */
        #splash-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }

        /* Ad Slider */
        .slider-wrapper { position: relative; width: 100%; height: 220px; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Search Bar */
        .search-container { position: relative; margin-bottom: 1.5rem; }
        .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem 3rem 1rem 1rem; border-radius: 1.2rem; color: white; transition: 0.3s; }
        .search-input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); box-shadow: 0 0 15px rgba(0,191,255,0.1); }
        .search-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #888; }

        /* Product Cards */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid #444; transition: 0.4s; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* Marquee */
        .marquee { background: var(--primary); height: 28px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.75rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 30s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .category-btn { white-space: nowrap; padding: 0.6rem 1.2rem; border-radius: 99px; font-size: 0.8rem; border: 1px solid #444; color: #bbb; transition: 0.3s; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 800; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-12 no-scrollbar">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-48 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-[#00BFFF] w-0" style="animation: loadSplash 2.2s forwards"></div>
        </div>
    </div>

    <div class="marquee">
        <div id="marquee-text" class="marquee-content font-black">
            ✨ جاري تحميل أحدث عروض Almaz Store... ✨
        </div>
    </div>

    <header class="container mx-auto px-4 py-3 sticky top-8 z-40 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 transition active:scale-90 group">
            <i data-lucide="shopping-bag" class="text-[#00BFFF] w-5 h-5 group-hover:scale-110"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-8">
        
        <div class="search-container">
            <i data-lucide="search" class="search-icon w-5 h-5"></i>
            <input type="text" id="search-input" placeholder="ابحث عن موديل، نوع، أو سعر..." class="search-input">
        </div>

        <div id="ad-slider" class="slider-wrapper">
            <div class="slide active"><img src="https://via.placeholder.com/800x300/222/00BFFF?text=ALMAZ+PREMIUM"></div>
        </div>

        <div class="flex overflow-x-auto gap-3 mb-8 no-scrollbar pb-2">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('shoes')" class="category-btn">أحذية</button>
        </div>

        <div id="products-grid" class="product-grid mb-24">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[400px] bg-[#1a1a1a] z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10 shadow-3xl">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
            <h2 class="text-xl font-black text-[#00BFFF] italic">حقيبة التسوق</h2>
            <button id="close-cart" class="p-2 bg-white/5 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 mt-6 border-t border-white/10">
            <div class="flex justify-between mb-6 font-bold text-xl"><span>الإجمالي:</span><span id="cart-total" class="text-[#00BFFF]">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black shadow-lg active:scale-95 transition">تأكيد الطلب (واتساب) ✅</button>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = [];
        let currentSlide = 0;

        // 1. تحميل البيانات (تشمل المنتجات، الإعلانات، ونص الشريط)
        async function fetchStoreData() {
            try {
                const response = await fetch('products.json?v=' + Date.now());
                const data = await response.json();
                
                // تخزين البيانات
                productsData = data.products || [];
                
                // تحديث الشريط العلوي
                if(data.marqueeText) document.getElementById('marquee-text').innerText = data.marqueeText;

                // تحديث السلايدر الإعلاني
                if(data.ads && data.ads.length > 0) {
                    const slider = document.getElementById('ad-slider');
                    slider.innerHTML = data.ads.map((img, i) => `
                        <div class="slide ${i === 0 ? 'active' : ''}">
                            <img src="${img}" alt="Ad">
                        </div>
                    `).join('');
                    startSlider();
                }

                renderProducts(productsData);
            } catch (e) {
                console.error("فشل تحميل البيانات. تأكد من وجود ملف products.json");
                // بيانات تجريبية في حال فشل الملف
                document.getElementById('products-grid').innerHTML = "<p class='col-span-full text-center py-10 text-gray-500'>يرجى رفع ملف products.json لتفعيل المتجر.</p>";
            }
        }

        // 2. وظيفة السلايدر
        function startSlider() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 4000); // تغيير الصورة كل 4 ثواني
        }

        // 3. عرض المنتجات
        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card p-3">
                    <div class="relative overflow-hidden rounded-xl mb-3 h-48 bg-black/20">
                        <img src="${Array.isArray(p.image) ? p.image[0] : p.image}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-xs font-bold mb-1 truncate">${p.name}</h3>
                    <p class="text-[#00BFFF] font-black text-lg mb-3">$${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-white/5 hover:bg-[#00BFFF] hover:text-black border border-white/10 py-2.5 rounded-lg text-[10px] font-bold transition">إضافة للسلة</button>
                </div>
            `).join('');
        }

        // 4. نظام البحث الفوري
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = productsData.filter(p => 
                p.name.toLowerCase().includes(term) || 
                (p.category && p.category.toLowerCase().includes(term))
            );
            renderProducts(filtered);
        });

        // 5. الفلترة حسب الفئة
        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(cat === 'all') renderProducts(productsData);
            else renderProducts(productsData.filter(p => p.category === cat));
        };

        // 6. إدارة السلة
        window.addToCart = (id) => {
            const product = productsData.find(p => p.id === id);
            cart.push({ ...product, cartId: Date.now() });
            updateCartUI();
            // تفتيح السلة تلقائياً عند الإضافة
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0;
            content.innerHTML = cart.map(item => {
                total += item.price;
                return `
                <div class="flex gap-4 bg-white/5 p-3 rounded-xl border border-white/5">
                    <img src="${Array.isArray(item.image) ? item.image[0] : item.image}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-grow">
                        <p class="font-bold text-xs">${item.name}</p>
                        <p class="text-[#00BFFF] font-black mt-1">$${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeFromCart = (cartId) => {
            cart = cart.filter(i => i.cartId !== cartId);
            updateCartUI();
        };

        // 7. واتساب
        window.sendOrderToWhatsApp = () => {
            if(cart.length === 0) return alert("السلة فارغة!");
            let msg = "🚀 *طلب جديد من متجر Almaz*\n\n";
            cart.forEach((p, i) => msg += `${i+1}. ${p.name} - $${p.price}\n`);
            msg += `\n💰 *الإجمالي: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // تهيئة عند التشغيل
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchStoreData();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 800);
            }, 2000);
        });

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

    </script>
</body>
    </html>
