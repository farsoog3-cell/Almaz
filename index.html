<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* تأثير ظهور المنتجات المتحرك */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.8s ease forwards; opacity: 0; }

        /* تأثير البطاقة عند اللمس (الذي سألت عنه) */
        .product-card { 
            background: var(--card-bg); 
            border-radius: 1.5rem; 
            border: 1px solid var(--border-color); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden; 
            position: relative;
        }
        .product-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--primary); 
            box-shadow: 0 20px 40px rgba(0, 191, 255, 0.15); 
        }
        .product-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .product-card:hover::before { left: 100%; }

        /* تأثير الصورة */
        .img-container img { transition: transform 0.6s ease; }
        .product-card:hover .img-container img { transform: scale(1.1); }

        /* علامة الخصم المتحركة */
        .discount-badge { 
            position: absolute; top: 12px; left: 12px; background: #ff3b30; color: white; 
            padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 900; z-index: 20; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* ستايلات الكمية */
        .qty-controls { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 4px; margin-bottom: 12px; }
        .qty-btn-mini { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: #333; border-radius: 8px; color: var(--primary); transition: 0.3s; }
        .qty-btn-mini:hover { background: var(--primary); color: black; }

        /* سلايدر الإعلانات */
        .slider-container { position: relative; width: 100%; height: clamp(200px, 40vh, 400px); overflow: hidden; border-radius: 25px; margin: 20px 0; border: 1px solid var(--border-color); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .slide-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); transform: scale(1.1); transition: 10s linear; }
        .slide.active .slide-img { transform: scale(1); }
    </style>
</head>
<body>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-zinc-800/80 backdrop-blur-xl rounded-2xl border border-white/5 flex justify-between items-center mt-2 max-w-[95%]">
        <div class="text-2xl font-black italic tracking-tighter">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 transition active:scale-90">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 max-w-[95%]">
        <div id="hero-slider" class="slider-container"></div>

        <div class="max-w-[600px] mx-auto relative mb-10 reveal">
            <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00BFFF] w-5 h-5"></i>
            <input type="text" id="search-input" class="w-full bg-[#26292d] border border-white/10 p-4 pr-12 rounded-2xl outline-none focus:border-[#00BFFF] transition" placeholder="ابحث عن قطعة الألماس الخاصة بك..." oninput="handleSearch()">
        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-24"></div>
    </main>

    <div id="image-viewer" class="z-[100]">
        <button onclick="document.getElementById('image-viewer').classList.remove('active')" class="absolute top-10 right-10 text-white"><i data-lucide="x" class="w-10 h-10"></i></button>
        <img id="viewer-img" class="max-w-[90%] max-h-[70vh] rounded-2xl object-contain shadow-2xl">
        <div id="thumb-container" class="flex gap-3 mt-6 overflow-x-auto p-2 no-scrollbar"></div>
    </div>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[420px] bg-[#1a1c1e]/95 backdrop-blur-2xl z-[100] translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/5">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h2 class="text-2xl font-black text-[#00BFFF]">حقيبة التسوق</h2>
            <button id="close-cart" class="hover:rotate-90 transition-transform"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-5 font-black text-2xl"><span>الإجمالي:</span><span id="cart-total" class="text-[#00BFFF]">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-5 rounded-2xl font-black text-lg shadow-lg hover:brightness-110 transition">إرسال الطلب (واتساب) ✅</button>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = [];
        window.tempSelections = {}; 

        const adsData = [
            { image: "https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=1200", title: "ALMAZ LUXURY", desc: "أناقتك تبدأ من هنا" },
            { image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=1200", title: "تخفيضات العيد", desc: "خصم يصل إلى 50%" }
        ];

        function initSlider() {
            const slider = document.getElementById('hero-slider');
            slider.innerHTML = adsData.map((ad, i) => `
                <div class="slide ${i === 0 ? 'active' : ''}">
                    <img src="${ad.image}" class="slide-img">
                    <div class="slide-content text-center">
                        <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter reveal">${ad.title}</h2>
                        <p class="text-lg opacity-80 reveal">${ad.desc}</p>
                    </div>
                </div>`).join('');
            let cur = 0; 
            setInterval(() => {
                const s = document.querySelectorAll('.slide');
                if(s.length < 2) return;
                s[cur].classList.remove('active'); 
                cur = (cur + 1) % s.length; 
                s[cur].classList.add('active');
            }, 6000);
        }

        async function fetchProducts() {
            try {
                const res = await fetch('products.json?v=' + Date.now());
                productsData = await res.json();
                renderProducts(productsData);
            } catch (e) { console.log("JSON Load Failed"); }
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map((p, index) => {
                const colors = p.colors || [];
                const sizes = p.sizes || [];
                const hasDiscount = p.oldPrice && p.oldPrice > p.price;
                const imgs = Array.isArray(p.image) ? p.image : [p.image];
                
                if (!window.tempSelections[p.id]) window.tempSelections[p.id] = { color: colors[0], size: sizes[0], qty: 1 };

                return `
                <div class="product-card p-4 reveal" style="animation-delay: ${index * 0.1}s">
                    ${hasDiscount ? `<div class="discount-badge">خصم %${Math.round((p.oldPrice-p.price)/p.oldPrice*100)}-</div>` : ''}
                    <div class="img-container relative overflow-hidden rounded-2xl mb-4 h-52">
                        <img src="${imgs[0]}" class="w-full h-full object-cover cursor-pointer" onclick='openGallery(${JSON.stringify(imgs)})'>
                    </div>
                    
                    <h3 class="font-bold text-sm truncate mb-2 text-white/90">${p.name}</h3>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-[#00BFFF] font-black text-xl tracking-tighter">$${p.price}</span>
                        ${hasDiscount ? `<span class="text-gray-500 line-through text-xs">$${p.oldPrice}</span>` : ''}
                    </div>

                    <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar">${colors.map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="option-dot ${window.tempSelections[p.id].color===c?'selected':''}" style="background:${c}"></div>`).join('')}</div>
                    <div class="flex flex-wrap gap-1.5 mb-4">${sizes.map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="size-btn ${window.tempSelections[p.id].size===s?'selected':''}">${s}</button>`).join('')}</div>

                    <div class="qty-controls">
                        <button onclick="updateTempQty(${p.id}, -1)" class="qty-btn-mini"><i data-lucide="minus" class="w-4 h-4"></i></button>
                        <span id="qty-val-${p.id}" class="font-bold text-sm">${window.tempSelections[p.id].qty}</span>
                        <button onclick="updateTempQty(${p.id}, 1)" class="qty-btn-mini"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>

                    <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-3.5 rounded-xl font-black text-xs hover:scale-[0.97] transition active:scale-90 shadow-lg shadow-blue-500/10">أضف للحقيبة</button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.updateTempQty = (id, delta) => {
            window.tempSelections[id].qty = Math.max(1, window.tempSelections[id].qty + delta);
            document.getElementById(`qty-val-${id}`).innerText = window.tempSelections[id].qty;
        };

        window.selectOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.selected').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        function addToCart(id) {
            const p = productsData.find(x => x.id === id);
            const sel = window.tempSelections[id];
            cart.push({ ...p, ...sel, cartId: Date.now() });
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0;
            content.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                <div class="flex gap-4 bg-white/5 p-4 rounded-2xl items-center border border-white/5">
                    <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-grow">
                        <p class="font-bold text-sm text-white">${item.name}</p>
                        <p class="text-[10px] text-gray-400 mt-1">${item.qty} قطعة | ${item.color} | ${item.size}</p>
                        <p class="text-[#00BFFF] font-black mt-1">$${item.price * item.qty}</p>
                    </div>
                    <button onclick="cart=cart.filter(x=>x.cartId!==${item.cartId});updateUI();" class="text-red-500 bg-red-500/10 p-2 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.openGallery = (imgs) => {
            const mainImg = document.getElementById('viewer-img');
            const thumbBox = document.getElementById('thumb-container');
            mainImg.src = imgs[0];
            thumbBox.innerHTML = imgs.map(img => `<img src="${img}" class="w-20 h-20 rounded-xl object-cover cursor-pointer border-2 border-transparent hover:border-[#00BFFF] transition" onclick="document.getElementById('viewer-img').src='${img}'">`).join('');
            document.getElementById('image-viewer').classList.add('active');
            lucide.createIcons();
        };

        function sendOrderToWhatsApp() {
            if(cart.length === 0) return;
            let msg = "🚀 *طلب جديد من Almaz Store*\n\n" + cart.map(i => `• ${i.name}\n  الكمية: ${i.qty}\n  المواصفات: ${i.color} - ${i.size}\n`).join('\n');
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        }

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
        
        window.onload = () => { initSlider(); fetchProducts(); };
    </script>
</body>
</html>
