<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinar - بطاقة دفع افتراضية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            /* تدرج لوني مطابق للصورة: أزرق ملكي في الأعلى يميل للسواد في الأسفل */
            background: linear-gradient(180deg, #1e4bb5 0%, #0a236e 45%, #04103a 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .logo-text {
            font-family: Arial, sans-serif; /* لجعل كلمة dinar بسيطة كما في الصورة */
            font-weight: 900;
            letter-spacing: -1.5px;
        }
        .btn-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="text-white flex flex-col items-center px-6 py-8">

    <nav class="w-full flex justify-between items-center mb-12">
        <div class="text-4xl logo-text">dinar</div>
        <button class="bg-white/10 p-2 rounded-full">
            <svg width="32" height="24" viewBox="0 0 32 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="2.5" rx="1.25" fill="white" fill-opacity="0.8"/>
                <rect y="10" width="32" height="2.5" rx="1.25" fill="white" fill-opacity="0.8"/>
                <rect y="20" width="32" height="2.5" rx="1.25" fill="white" fill-opacity="0.8"/>
            </svg>
        </button>
    </nav>

    <main class="flex flex-col items-center text-center w-full max-w-lg">
        <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-4 tracking-tight">
            بطاقة دفع افتراضية <br> في ثواني
        </h1>
        
        <p class="text-white/70 text-lg md:text-xl font-medium px-4 mb-8">
            اصدر بطاقتك الافتراضية فوراً، و ادر مدفوعاتك العالمية بأمان
        </p>

        <div class="relative w-full max-w-sm flex justify-center mb-10">
            <img src="shop-front.jpg" 
                 alt="واجهة التطبيق" 
                 class="w-full h-auto object-contain">
        </div>
    </main>

    <footer class="w-full max-w-md mt-auto mb-4">
        <button class="btn-shadow w-full bg-white text-[#0a236e] font-bold py-4 rounded-[35px] text-2xl transition-all hover:bg-gray-100 active:scale-95">
            تحميل التطبيق
        </button>
    </footer>

</body>
</html>
