<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* شاشة التحميل */
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; animation: introLogo 2s forwards; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }
        @keyframes introLogo { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* السلايدر (اللوحة الإعلانية) */
        .slider-container { width: 95%; max-width: 1200px; margin: 10px auto 25px; position: relative; overflow: hidden; border-radius: 20px; aspect-ratio: 16/7; border: 1px solid var(--border-color); background: #111; }
        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .slide-content { position: absolute; bottom: 15px; right: 20px; text-align: right; z-index: 10; }
        .slider-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 20; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }

        /* البحث والأقسام */
        .search-wrapper { max-width: 600px; margin: 20px auto; padding: 0 20px; position: relative; }
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px 45px 14px 20px; border-radius: 18px; color: white; outline: none; font-size: 0.9rem; }
        .search-icon { position: absolute; right: 35px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 99px; font-size: 0.8rem; border: 1px solid var(--border-color); color: #aaa; transition: 0.3s; cursor: pointer; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 800; }

        /* المنتجات */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); transition: 0.4s; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .discount-badge { position: absolute; top: 10px; left: 10px; background: #ff3b30; color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; z-index: 10; }

        /* الشريط المتحرك */
        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* خيارات المنتج */
        .option-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; }
        .option-dot.selected::after { content:'✓'; color:white; font-size:10px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #ccc; border-radius: 6px; padding: 4px 10px; font-size: 9px; }
        .size-btn.selected { background: white; color: black; font-weight: 800; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-10 no-scrollbar overflow-x-hidden">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-[#00BFFF] w-0" style="animation: loadSplash 2.2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-zinc-800/90 backdrop-blur-xl rounded-2xl border border-white/5 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 group">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div class="search-wrapper">
        <i data-lucide="search" class="search-icon w-5 h-5"></i>
        <input type="text" id="search-input" class="search-bar" placeholder="ابحث عن منتج..." oninput="handleSearch()">
    </div>

    <section id="slider-section" class="hidden">
        <div class="slider-container">
            <div id="slider-track" class="slider-track"></div>
            <div class="slider-dots" id="slider-dots"></div>
        </div>
    </section>

    <main class="container mx-auto px-4 mt-4">
        <div class="category-scroll mb-8">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
        </div>
        <div id="products-grid" class="product-grid mb-24"></div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[420px] bg-zinc-900/98 backdrop-blur-3xl z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <h2 class="text-xl font-black text-[#00BFFF]">حقيبة التسوق</h2>
            <button id="close-cart" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-4 font-black text-xl"><span>الإجمالي:</span><span id="cart-total" class="text-[#00BFFF]">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black">إرسال الطلب عبر واتساب ✅</button>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = [];
        window.tempSelections = {};

        // جلب الإعلانات من لوحة التحكم (slides.json)
        async function fetchSlides() {
            try {
                const response = await fetch('slides.json?v=' + Date.now());
                const slides = await response.json();
                if (slides && slides.length > 0) {
                    const track = document.getElementById('slider-track');
                    const dotsCont = document.getElementById('slider-dots');
                    document.getElementById('slider-section').classList.remove('hidden');

                    slides.forEach((s, i) => {
                        track.innerHTML += `
                            <div class="slide">
                                <img src="${s.image}">
                                <div class="slide-content">
                                    <h2 class="text-xl font-black text-white">${s.title || ''}</h2>
                                    <p class="text-[10px] text-[#00BFFF] font-bold">${s.desc || ''}</p>
                                </div>
                            </div>`;
                        const dot = document.createElement('div');
                        dot.className = `dot ${i === 0 ? 'active' : ''}`;
                        dotsCont.appendChild(dot);
                    });
                    initSliderLogic(slides.length);
                }
            } catch (e) { console.log("No slides found"); }
        }

        function initSliderLogic(total) {
            let current = 0;
            const track = document.getElementById('slider-track');
            const dots = document.querySelectorAll('.dot');
            setInterval(() => {
                current = (current + 1) % total;
                track.style.transform = `translateX(${current * 100}%)`;
                dots.forEach((d, i) => d.classList.toggle('active', i === current));
            }, 5000);
        }

        async function fetchProducts() {
            try {
                const response = await fetch('products.json?v=' + Date.now());
                productsData = await response.json();
                renderProducts(productsData);
            } catch (e) { console.error("Error loading products"); }
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                const colors = p.colors || [];
                const sizes = p.sizes || [];
                if (!window.tempSelections[p.id]) window.tempSelections[p.id] = { color: colors[0] || 'N/A', size: sizes[0] || 'N/A', qty: 1 };
                
                grid.innerHTML += `
                    <div class="product-card p-3">
                        <img src="${Array.isArray(p.image) ? p.image[0] : p.image}" class="w-full h-40 object-cover rounded-xl mb-2">
                        <h3 class="font-bold text-xs truncate">${p.name}</h3>
                        <div class="text-[#00BFFF] font-black text-lg mb-2">$${p.price}</div>
                        <div class="flex gap-1 mb-2">
                            ${colors.map(c => `<div onclick="updateOpt(${p.id},'color','${c}',this)" class="option-dot" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1 mb-3">
                            ${sizes.map(s => `<button onclick="updateOpt(${p.id},'size','${s}',this)" class="size-btn">${s}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-2 rounded-lg font-black text-[10px]">إضافة للحقيبة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.updateOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.option-dot, .size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            const sel = window.tempSelections[id];
            cart.push({ ...p, ...sel, cartId: Date.now() });
            updateUI();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0; content.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                content.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-lg"><span class="text-xs">${item.name}</span><span class="text-[#00BFFF]">$${item.price}</span></div>`;
            });
            document.getElementById('cart-total').innerText = `$${total}`;
        }

        window.sendOrderToWhatsApp = () => {
            let msg = "طلب جديد من Almaz Store:\n";
            cart.forEach(p => msg += `- ${p.name} (${p.color}/${p.size})\n`);
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        };

        window.addEventListener('load', () => {
            fetchProducts();
            fetchSlides();
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2500);
        });

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
    </script>
</body>
</html>
