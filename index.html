<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* شريط الإعلانات المتحرك */
        .marquee-container { background: var(--primary); color: black; padding: 8px 0; font-weight: 900; overflow: hidden; white-space: nowrap; position: relative; }
        .marquee-text { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .category-btn { padding: 10px 20px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border-color); font-size: 13px; transition: 0.3s; white-space: nowrap; }
        .category-btn.active { background: var(--primary); color: black; font-weight: bold; border-color: var(--primary); }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); transition: all 0.4s ease; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .slider-container { position: relative; width: 100%; height: clamp(200px, 40vh, 450px); overflow: hidden; border-radius: 25px; margin: 20px 0; border: 1px solid var(--border-color); background: #222; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .slide-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        
        .option-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; }
        .option-dot.selected::after { content:'✓'; color:white; font-size:10px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #ccc; border-radius: 6px; padding: 4px 10px; font-size: 9px; }
        .size-btn.selected { background: white; color: black; font-weight: 800; }
        
        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(15px); flex-direction: column; }
        #image-viewer.active { display: flex; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-2">

    <div class="marquee-container">
        <div class="marquee-text">
            🔥 توصيل مجاني للطلبات الأكثر من 500$ • خصومات تصل إلى 50% بمناسبة الافتتاح • أحدث موديلات 2026 وصلت الآن 🔥
        </div>
    </div>

    <header class="container mx-auto px-4 py-3 sticky top-2 z-40 bg-zinc-800/90 backdrop-blur-xl rounded-2xl border border-white/5 flex justify-between items-center mt-4 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-4 max-w-[95%]">
        <div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar mb-4">
            <button class="category-btn active" onclick="filterCategory('الكل', this)">الكل</button>
            <button class="category-btn" onclick="filterCategory('لبس نسائي', this)">نسائي</button>
            <button class="category-btn" onclick="filterCategory('لبس رجالي', this)">رجالي</button>
            <button class="category-btn" onclick="filterCategory('احذيه رجالي', this)">أحذية رجالي</button>
            <button class="category-btn" onclick="filterCategory('احذيه نسائي', this)">أحذية نسائي</button>
        </div>

        <div id="hero-slider" class="slider-container">
            <div class="flex items-center justify-center h-full text-gray-500">جاري تحميل العروض...</div>
        </div>

        <div class="search-wrapper max-w-[600px] mx-auto relative mb-8">
            <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00BFFF] w-5 h-5"></i>
            <input type="text" id="search-input" class="w-full bg-[#26292d] border border-white/10 p-4 pr-12 rounded-2xl outline-none focus:border-[#00BFFF]" placeholder="ابحث عن منتجك..." oninput="handleSearch()">
        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-24"></div>
    </main>

    <div id="image-viewer">
        <button onclick="document.getElementById('image-viewer').classList.remove('active')" class="absolute top-10 right-10 text-white"><i data-lucide="x" class="w-10 h-10"></i></button>
        <img id="viewer-img" class="max-w-[90%] max-h-[70vh] rounded-2xl object-contain">
        <div id="thumb-container" class="flex gap-2 mt-4 overflow-x-auto p-2"></div>
    </div>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[420px] bg-[#1a1c1e] z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/5">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h2 class="text-2xl font-black text-[#00BFFF]">حقيبة التسوق</h2>
            <button id="close-cart"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-5 font-black text-2xl"><span>الإجمالي:</span><span id="cart-total">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-5 rounded-xl font-black shadow-lg">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        // إعدادات الروابط (نفس التي في لوحة التحكم)
        const REPO_OWNER = 'farsoog3-cell';
        const REPO_NAME = 'Almaz';
        const BASE_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/`;

        let productsData = [];
        let adsData = [];
        let cart = [];
        window.tempSelections = {}; 

        // جلب المنتجات
        async function fetchProducts() {
            try {
                const res = await fetch(BASE_URL + 'products.json?v=' + Date.now());
                productsData = await res.json();
                renderProducts(productsData);
            } catch (e) { console.error("Error loading products"); }
        }

        // جلب الإعلانات (الجديد)
        async function fetchAds() {
            try {
                const res = await fetch(BASE_URL + 'ads.json?v=' + Date.now());
                adsData = await res.json();
                initSlider();
            } catch (e) { 
                console.error("No ads found, using default");
                adsData = [{image: "https://via.placeholder.com/1200x600?text=Almaz+Store", title: "مرحباً بكم", desc: "أرقى الموديلات"}];
                initSlider();
            }
        }

        function initSlider() {
            const slider = document.getElementById('hero-slider');
            if(adsData.length === 0) return;
            slider.innerHTML = adsData.map((ad, i) => `
                <div class="slide ${i === 0 ? 'active' : ''}">
                    <img src="${ad.image}" class="slide-img">
                    <div class="slide-content text-center absolute px-4">
                        <h2 class="text-3xl md:text-5xl font-black mb-2">${ad.title}</h2>
                        <p class="text-lg opacity-80">${ad.desc}</p>
                    </div>
                </div>
            `).join('');

            let cur = 0;
            if(adsData.length > 1) {
                setInterval(() => {
                    const slides = document.querySelectorAll('.slide');
                    slides[cur].classList.remove('active');
                    cur = (cur + 1) % slides.length;
                    slides[cur].classList.add('active');
                }, 5000);
            }
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => {
                const imgs = Array.isArray(p.image) ? p.image : [p.image];
                if (!window.tempSelections[p.id]) window.tempSelections[p.id] = { color: p.colors[0], size: p.sizes[0], qty: 1 };

                return `
                <div class="product-card p-3.5">
                    <img src="${imgs[0]}" class="w-full h-48 object-cover rounded-2xl mb-3 cursor-pointer" onclick='openGallery(${JSON.stringify(imgs)})'>
                    <h3 class="font-bold text-xs truncate mb-1">${p.name}</h3>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-[#00BFFF] font-black text-lg">$${p.price}</span>
                        ${p.oldPrice ? `<span class="text-gray-500 line-through text-[10px]">$${p.oldPrice}</span>` : ''}
                    </div>
                    <div class="flex gap-1.5 mb-3">${p.colors.map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="option-dot ${window.tempSelections[p.id].color===c?'selected':''}" style="background:${c}"></div>`).join('')}</div>
                    <div class="flex flex-wrap gap-1 mb-3">${p.sizes.map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="size-btn ${window.tempSelections[p.id].size===s?'selected':''}">${s}</button>`).join('')}</div>
                    <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-3 rounded-xl font-black text-[11px] hover:scale-95 transition">أضف للحقيبة</button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // منطق الفلترة والبحث
        function filterCategory(cat, el) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const filtered = cat === 'الكل' ? productsData : productsData.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function handleSearch() {
            const val = document.getElementById('search-input').value.toLowerCase();
            renderProducts(productsData.filter(p => p.name.toLowerCase().includes(val)));
        }

        function selectOpt(id, type, val, el) {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.selected').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addToCart(id) {
            const p = productsData.find(x => x.id === id);
            cart.push({ ...p, ...window.tempSelections[id], cartId: Date.now() });
            updateUI();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-content').innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="flex gap-4 bg-white/5 p-3 rounded-2xl items-center">
                    <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-14 h-14 rounded-xl object-cover">
                    <div class="flex-grow"><p class="font-bold text-xs">${item.name}</p><p class="text-[#00BFFF] font-black">$${item.price}</p></div>
                    <button onclick="cart=cart.filter(x=>x.cartId!==${item.cartId});updateUI();" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        function sendOrderToWhatsApp() {
            if(cart.length === 0) return;
            let msg = "🚀 *طلب جديد من Almaz Store*\n\n" + cart.map(i => `• ${i.name} [${i.color}/${i.size}] - $${i.price}`).join('\n');
            msg += `\n\n💰 *الإجمالي: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        }

        window.openGallery = (imgs) => {
            document.getElementById('viewer-img').src = imgs[0];
            document.getElementById('thumb-container').innerHTML = imgs.map(img => `<img src="${img}" class="w-16 h-16 rounded-lg object-cover cursor-pointer" onclick="document.getElementById('viewer-img').src='${img}'">`).join('');
            document.getElementById('image-viewer').classList.add('active');
        };

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
        
        window.onload = () => { fetchAds(); fetchProducts(); };
    </script>
</body>
</html>
