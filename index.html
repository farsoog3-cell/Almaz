<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #00BFFF; 
            --bg-dark: #2a2a2a; 
            --card-bg: #333333; 
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Splash Screen */
        #splash-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }

        /* Ad Slider */
        .slider-wrapper { position: relative; width: 100%; height: 200px; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Search Bar */
        .search-container { position: relative; margin-bottom: 1.5rem; }
        .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem 3rem 0.8rem 1rem; border-radius: 1rem; color: white; transition: 0.3s; font-size: 0.9rem; }
        .search-input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .search-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #888; }

        /* Product Cards */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 1.2rem; border: 1px solid #444; transition: 0.3s; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .discount-badge { position: absolute; top: 8px; left: 8px; background: #ff3b30; color: white; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; }
        .new-badge { position: absolute; top: 8px; right: 8px; background: var(--primary); color: black; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; }

        /* Marquee */
        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .option-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .size-tag { font-size: 9px; background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 4px; color: #ccc; }
    </style>
</head>
<body class="pt-10 no-scrollbar">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-[#00BFFF] w-0" style="animation: loadSplash 2.2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div id="marquee-text" class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 group">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-8">
        <div class="search-container">
            <i data-lucide="search" class="search-icon w-4 h-4"></i>
            <input type="text" id="search-input" placeholder="ابحث عن تيشيرت، مقاس، أو سعر..." class="search-input">
        </div>

        <div id="ad-slider" class="slider-wrapper">
            <div class="slide active"><img src="https://i.ibb.co/kVDKt20h/FB-IMG-1774503765907.jpg"></div>
        </div>

        <div id="products-grid" class="product-grid mb-24"></div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[400px] bg-[#1a1a1a] z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
            <h2 class="text-xl font-black text-[#00BFFF]">حقيبة الطلبات</h2>
            <button id="close-cart" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-4 font-bold text-lg"><span>الإجمالي:</span><span id="cart-total">$0</span></div>
            <button onclick="sendOrder()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black">إرسال الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        // البيانات التي أرسلتها (سيتم تحميلها من ملف خارجي في الواقع)
        let productsData = []; 
        let cart = [];
        let currentSlide = 0;

        async function loadStore() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                
                // إذا كان الـ JSON هو الذي أرسلته مباشرة (مصفوفة)
                productsData = Array.isArray(data) ? data : data.products;
                
                // تحديث الإعلانات من الصور الموجودة في أول منتجين كمثال
                const ads = productsData.slice(0, 3).map(p => p.image[0]);
                setupSlider(ads);
                
                renderProducts(productsData);
            } catch (e) {
                // في حال لم تجد الملف، استخدم البيانات التي أرسلتها أنت هنا يدوياً
                productsData = [ /* ضع مصفوفة الـ JSON هنا للتجربة المحلية */ ];
                renderProducts(productsData);
            }
        }

        function setupSlider(images) {
            const slider = document.getElementById('ad-slider');
            slider.innerHTML = images.map((img, i) => `
                <div class="slide ${i === 0 ? 'active' : ''}"><img src="${img}"></div>
            `).join('');
            
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                if(slides.length < 2) return;
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 4000);
        }

        function renderProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(p => {
                const hasDiscount = p.oldPrice && p.oldPrice > p.price;
                return `
                <div class="product-card p-2">
                    ${hasDiscount ? `<div class="discount-badge">خصم</div>` : ''}
                    ${p.isNew ? `<div class="new-badge">جديد</div>` : ''}
                    <img src="${p.image[0]}" class="w-full h-40 object-cover rounded-lg mb-2">
                    <h3 class="text-[11px] font-bold truncate">${p.name}</h3>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[#00BFFF] font-black text-sm">$${p.price}</span>
                        ${hasDiscount ? `<span class="text-[9px] line-through text-gray-500">$${p.oldPrice}</span>` : ''}
                    </div>
                    <div class="flex gap-1 mb-2">
                        ${p.colors.map(c => `<div class="option-dot" style="background:${c}"></div>`).join('')}
                    </div>
                    <div class="flex flex-wrap gap-1 mb-3">
                        ${p.sizes.map(s => `<span class="size-tag">${s}</span>`).join('')}
                    </div>
                    <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-white/5 border border-white/10 py-2 rounded-lg text-[10px] font-bold">إضافة</button>
                </div>
            `}).join('');
        }

        // نظام البحث
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = productsData.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.price.toString().includes(term)
            );
            renderProducts(filtered);
        });

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            cart.push(p);
            updateCart();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0;
            content.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                <div class="flex gap-3 bg-white/5 p-2 rounded-lg items-center">
                    <img src="${item.image[0]}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-grow"><p class="text-[10px] font-bold">${item.name}</p><p class="text-[#00BFFF] font-black">$${item.price}</p></div>
                    <button onclick="cart.splice(${index}, 1); updateCart();" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `}).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.sendOrder = () => {
            let msg = "🚀 طلب جديد:\n";
            cart.forEach(p => msg += `- ${p.name} ($${p.price})\n`);
            msg += `\n💰 الإجمالي: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        };

        window.onload = () => {
            lucide.createIcons();
            loadStore();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 800);
            }, 2000);
        };

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
    </script>
</body>
</html>
