<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | الإصدار الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* تحسينات السكرول */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* تأثيرات السلايدر */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; border-radius: 20px; aspect-ratio: 16/9; background: #000; }
        .slider-inner { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); height: 100%; }
        .slide-item { min-width: 100%; height: 100%; position: relative; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        /* كرت المنتج المطور */
        .p-card { background: var(--card); border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        .p-card:active { transform: scale(0.97); }
        .p-img-container { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 15px; overflow: hidden; margin-bottom: 8px; }
        
        /* الأقسام المتحركة */
        .cat-tag { padding: 8px 18px; border-radius: 12px; background: #2a2a2a; border: 1px solid transparent; white-space: nowrap; font-size: 0.8rem; transition: 0.3s; }
        .cat-tag.active { background: var(--primary); color: #000; font-weight: 700; box-shadow: 0 4px 12px rgba(0,191,255,0.3); }

        /* شارة الخصم */
        .sale-tag { position: absolute; top: 8px; left: 8px; background: #ff3b30; color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; z-index: 10; }

        /* الشريط العلوي المتحرك */
        .top-banner { background: var(--primary); color: #000; padding: 4px 0; font-size: 0.7rem; font-weight: 900; position: fixed; top: 0; width: 100%; z-index: 1000; overflow: hidden; }
        .marquee-inner { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* سلة التسوق */
        .cart-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .cart-panel.active { visibility: visible; opacity: 1; }
        .cart-content { position: absolute; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-radius: 30px 30px 0 0; max-height: 85vh; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .cart-panel.active .cart-content { transform: translateY(0); }
    </style>
</head>
<body class="pt-10">

    <div class="top-banner">
        <div class="marquee-inner" id="marquee-text">✨ تحميل العروض الحصرية... ✨</div>
    </div>

    <header class="flex justify-between items-center px-5 py-4 sticky top-6 z-50">
        <div class="text-2xl font-black tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <div class="flex gap-3">
            <button onclick="toggleSearch()" class="p-2 bg-white/5 rounded-full border border-white/10"><i data-lucide="search" class="w-5 h-5"></i></button>
            <button onclick="openCart()" class="relative p-2 bg-white/5 rounded-full border border-white/10">
                <i data-lucide="shopping-bag" class="text-[#00BFFF] w-5 h-5"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </header>

    <div id="search-box" class="hidden px-5 mb-4">
        <input type="text" id="p-search" oninput="runSearch()" placeholder="ابحث عن منتج..." class="w-full bg-[#222] border border-white/10 p-3 rounded-xl outline-none focus:border-[#00BFFF]">
    </div>

    <section class="px-5 mb-6" id="slider-area" style="display: none;">
        <div class="slider-wrapper">
            <div id="slider-track" class="slider-inner"></div>
        </div>
    </section>

    <nav class="px-5 mb-6 overflow-x-auto no-scrollbar flex gap-2 sticky top-[70px] bg-[#121212] py-2 z-40">
        <button onclick="filterCat('all', this)" class="cat-tag active">الكل</button>
        <button onclick="filterCat('men_shoes', this)" class="cat-tag">أحذية رجالي</button>
        <button onclick="filterCat('women_shoes', this)" class="cat-tag">أحذية نسائي</button>
        <button onclick="filterCat('sport_shoes', this)" class="cat-tag">رياضية</button>
        <button onclick="filterCat('men_clothing', this)" class="cat-tag">ملابس</button>
    </nav>

    <main class="px-5 pb-24">
        <div id="product-grid" class="grid grid-cols-2 gap-3 md:grid-cols-3 lg:grid-cols-4"></div>
    </main>

    <div id="cart-overlay" class="cart-panel" onclick="closeCart()">
        <div class="cart-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
            <h2 class="text-xl font-bold mb-5 flex items-center gap-2"><i data-lucide="shopping-cart"></i> حقيبة التسوق</h2>
            <div id="cart-items" class="space-y-4 overflow-y-auto max-h-[40vh] mb-6 no-scrollbar"></div>
            <div class="border-t border-white/5 pt-5">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-400">إجمالي المبلغ</span>
                    <span id="cart-total" class="text-2xl font-black text-[#00BFFF]">$0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-[#00BFFF] text-black py-4 rounded-2xl font-black text-lg shadow-lg shadow-[#00BFFF]/20">تأكيد الطلب عبر واتساب</button>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [], cart = [], currentCat = 'all';
        window.selections = {};

        // جلب البيانات
        async function init() {
            try {
                const [pRes, sRes, lRes] = await Promise.all([
                    fetch('products.json?v='+Date.now()),
                    fetch('settings.json?v='+Date.now()),
                    fetch('slides.json?v='+Date.now())
                ]);
                
                allProducts = await pRes.json();
                const settings = await sRes.json();
                const slides = await lRes.json();

                document.getElementById('marquee-text').innerText = settings.marquee;
                renderSlides(slides);
                renderProducts(allProducts);
            } catch (e) { console.error("Data Load Error"); }
        }

        function renderSlides(slides) {
            if(!slides.length) return;
            const track = document.getElementById('slider-track');
            document.getElementById('slider-area').style.display = 'block';
            slides.forEach(s => {
                track.innerHTML += `<div class="slide-item"><img src="${s.image}"></div>`;
            });
            let idx = 0;
            setInterval(() => {
                idx = (idx + 1) % slides.length;
                track.style.transform = `translateX(${idx * 100}%)`;
            }, 4000);
        }

        function renderProducts(data) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                if(!window.selections[p.id]) window.selections[p.id] = { color: p.colors?.[0]||'', size: p.sizes?.[0]||'', qty: 1 };
                const discount = p.oldPrice ? Math.round(((p.oldPrice - p.price)/p.oldPrice)*100) : 0;
                
                grid.innerHTML += `
                    <div class="p-card p-3">
                        <div class="p-img-container">
                            ${discount > 0 ? `<div class="sale-tag">خصم ${discount}%</div>` : ''}
                            <img src="${Array.isArray(p.image)?p.image[0]:p.image}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-[11px] font-bold truncate mb-1">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[#00BFFF] font-black text-sm">$${p.price}</span>
                            ${p.oldPrice ? `<span class="text-white/30 line-through text-[10px]">$${p.oldPrice}</span>` : ''}
                        </div>
                        <div class="flex gap-1 mb-3 overflow-x-auto no-scrollbar">
                            ${(p.colors||[]).map(c => `<div onclick="sel(${p.id},'color','${c}',this)" class="w-4 h-4 rounded-full border border-white/20 ${window.selections[p.id].color===c?'ring-2 ring-white':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1 mb-3">
                            ${(p.sizes||[]).map(s => `<button onclick="sel(${p.id},'size','${s}',this)" class="px-2 py-1 bg-white/5 rounded text-[9px] border border-white/5 ${window.selections[p.id].size===s?'!bg-white !text-black':''}">${s}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-white/5 hover:bg-[#00BFFF] hover:text-black border border-white/10 py-2 rounded-xl text-[10px] font-black transition-all">إضافة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.sel = (id, type, val, el) => {
            window.selections[id][type] = val;
            const container = el.parentElement;
            if(type === 'color') {
                container.querySelectorAll('div').forEach(d => d.classList.remove('ring-2', 'ring-white'));
                el.classList.add('ring-2', 'ring-white');
            } else {
                container.querySelectorAll('button').forEach(b => b.classList.remove('!bg-white', '!text-black'));
                el.classList.add('!bg-white', '!text-black');
            }
        };

        window.addToCart = (id) => {
            const p = allProducts.find(x => x.id === id);
            const s = window.selections[id];
            cart.push({...p, ...s, cartId: Date.now()});
            updateCartUI();
            openCart();
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            let total = 0;
            list.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `
                    <div class="flex items-center gap-4 bg-white/5 p-3 rounded-2xl border border-white/5">
                        <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-14 h-14 rounded-xl object-cover">
                        <div class="flex-grow">
                            <h4 class="text-xs font-bold">${item.name}</h4>
                            <p class="text-[10px] text-white/40">${item.size} | ${item.color}</p>
                            <p class="text-[#00BFFF] font-black">$${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeFromCart = (cid) => { cart = cart.filter(x => x.cartId !== cid); updateCartUI(); };
        window.openCart = () => document.getElementById('cart-overlay').classList.add('active');
        window.closeCart = () => document.getElementById('cart-overlay').classList.remove('active');
        window.toggleSearch = () => { const s = document.getElementById('search-box'); s.classList.toggle('hidden'); if(!s.classList.contains('hidden')) document.getElementById('p-search').focus(); };

        window.runSearch = () => {
            const q = document.getElementById('p-search').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        };

        window.filterCat = (cat, btn) => {
            document.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat));
        };

        window.checkout = () => {
            if(!cart.length) return;
            let m = "🚀 *طلب جديد من متجر الماس*\n\n";
            cart.forEach(i => m += `• ${i.name} (${i.size} | ${i.color})\n`);
            m += `\n💰 *الإجمالي: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(m)}`);
        };

        window.onload = () => { init(); lucide.createIcons(); };
    </script>
</body>
</html>
