<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almaz - متجر الملابس</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --black: #000000;
    --black-dark: #050505;
    --gold: #FFD700;
}

body {
    font-family: 'Tajawal', sans-serif;
    background-color: var(--black);
    color: var(--gold);
    margin: 0;
    min-height: 100vh;
}

/* الشعار والتوهج */
.logo-text {
    font-family: Arial, sans-serif;
    font-weight: 900;
    letter-spacing: -1.5px;
    color: var(--gold);
    text-shadow: 
        0 0 10px rgba(255,215,0,0.8),
        0 0 20px rgba(255,215,0,0.6),
        0 0 40px rgba(255,215,0,0.4);
}

.glow {
    text-shadow:
        0 0 8px rgba(255,215,0,0.8),
        0 0 20px rgba(255,215,0,0.5);
}

/* إطار الصورة فقط */
.product-image-frame {
    border: 3px solid var(--gold);
    padding: 4px;
    border-radius: 12px;
    display: inline-block;
    margin-bottom: 12px;
}

/* الشريط الجانبي كسلة فقط */
#sidebar {
    transition: transform 0.5s ease;
    background: linear-gradient(180deg, var(--black), var(--black-dark));
    width: 300px;
    padding: 16px;
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    transform: translateX(100%);
    z-index: 50;
}

/* شريط أعلى الصفحة */
#top-bar {
    width: 100%;
    background-color: var(--gold);
    overflow: hidden;
    white-space: nowrap;
    padding: 8px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 100;
}

#top-bar p {
    display: inline-block;
    color: black;
    font-weight: bold;
    font-size: 1rem;
    padding-left: 100%;
    animation: scrollText 20s linear infinite;
    text-shadow: 0 0 5px #000, 0 0 10px #000;
}

@keyframes scrollText {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
}

/* تعديل محتوى الصفحة لتحت الشريط */
body > main {
    margin-top: 40px; /* مسافة للشريط العلوي */
}

</style>
</head>

<body class="flex flex-col items-center px-6 py-8">

<!-- الشريط العلوي -->
<div id="top-bar">
    <p>اهلا بكم في موقع Almaz، اطلب الان إلى أنحاء العالم كما تشاء. اهلا بكم جميعا. مقر الموقع: تركيا</p>
</div>

<!-- الشريط الجانبي كسلة -->
<aside id="sidebar">
    <h2 class="text-xl font-bold mb-4 glow">سلة التسوق</h2>
    <div id="cart-items" class="flex flex-col gap-3">
        <p class="text-sm">السلة فارغة</p>
    </div>
</aside>

<!-- الهيدر -->
<nav class="w-full flex justify-between items-center mb-12 mt-12">
    <div class="logo-text text-3xl">Almaz</div>
    <button id="toggle-sidebar">🛒 السلة</button>
</nav>

<!-- المحتوى -->
<main class="text-center max-w-lg w-full">

<h1 class="text-4xl font-bold glow mb-8">
    متجر الملابس الفاخرة
</h1>

<!-- المنتج -->
<div class="w-full bg-black p-4 rounded-2xl shadow-lg">

    <!-- الصورة بإطار فقط -->
    <div class="product-image-frame">
        <img src="shop-front.jpg" class="w-full rounded-lg">
    </div>

    <!-- اسم المنتج -->
    <h2 class="text-xl font-bold glow mb-2">
        قميص كلاسيك فاخر
    </h2>

    <!-- الوصف -->
    <p class="text-sm text-yellow-300 mb-3 glow">
        قميص أنيق مصنوع من قطن عالي الجودة، مناسب لجميع المناسبات اليومية والرسمية.
    </p>

    <!-- السعر -->
    <div class="text-2xl font-bold mb-4 glow">
        $49.99
    </div>

    <!-- الأزرار -->
    <div class="flex gap-2 justify-center">
        <button id="buy-now" class="flex-1 bg-yellow-400 text-black py-3 rounded-full font-bold">
            اطلب الآن
        </button>

        <button id="add-cart" class="flex-1 border border-yellow-400 py-3 rounded-full">
            أضف للسلة
        </button>
    </div>

</div>

</main>

<!-- الفوتر -->
<footer class="mt-auto w-full max-w-md text-center mt-12">
    <p class="text-xs text-yellow-500">
        جميع الحقوق محفوظة © 2026 - Almaz
    </p>
</footer>

<script>
const sidebar = document.getElementById("sidebar");
const toggleSidebarBtn = document.getElementById("toggle-sidebar");
const addCartBtn = document.getElementById("add-cart");
const cartItems = document.getElementById("cart-items");

let sidebarOpen = false;

// فتح وإغلاق السلة
toggleSidebarBtn.onclick = () => {
    sidebarOpen = !sidebarOpen;
    sidebar.style.transform = sidebarOpen ? 'translateX(0)' : 'translateX(100%)';
};

// إضافة المنتج للسلة
addCartBtn.onclick = () => {
    cartItems.innerHTML = '<p class="glow">قميص كلاسيك فاخر - $49.99</p>';
    sidebar.style.transform = 'translateX(0)';
    sidebarOpen = true;
};
</script>

</body>
</html>ح
