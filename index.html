<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #00BFFF; /* أزرق فاتح */
            --bg-silver: #1a1c1e; /* فضي غامق جداً للخلفية */
            --card-silver: #2a2d31; /* فضي معدني للبطاقات */
            --accent-silver: #3f444a; /* فضي فاتح للحدود */
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg-silver); 
            color: #e0e0e0; 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* شاشة الترحيب */
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }

        /* حقل البحث */
        .search-container {
            position: relative;
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .search-input {
            width: 100%;
            background: var(--card-silver);
            border: 1px solid var(--accent-silver);
            padding: 12px 45px 12px 20px;
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.2);
        }
        .search-icon {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        /* المنتجات */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        
        .product-card { 
            background: var(--card-silver); 
            border-radius: 1.5rem; 
            border: 1px solid var(--accent-silver); 
            transition: 0.4s; 
            overflow: hidden; 
        }
        .product-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); 
        }

        /* الشريط الإعلاني */
        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .category-btn { white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 99px; font-size: 0.8rem; border: 1px solid var(--accent-silver); color: #aaa; transition: 0.3s; cursor: pointer; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 800; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-10 no-scrollbar">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-[#00BFFF] w-0" style="animation: loadSplash 2.2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-8 z-40 bg-zinc-800/80 backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 hover:bg-[#00BFFF] group transition">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5 group-hover:text-black"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div class="search-container mt-8">
        <i data-lucide="search" class="search-icon w-5 h-5"></i>
        <input type="text" id="search-input" class="search-input" placeholder="ابحث عن منتج، حذاء، أو ملابس..." oninput="searchProducts()">
    </div>

    <main class="container mx-auto px-4 mt-6">
        <div class="flex overflow-x-auto gap-2 mb-8 no-scrollbar pb-2">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="product-grid mb-24">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[420px] bg-[#1a1c1e] z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-8 pb-4 border-b border-white/10">
            <h2 class="text-xl font-bold text-[#00BFFF]">حقيبة التسوق</h2>
            <button id="close-cart" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-4 text-xl font-bold"><span>الإجمالي:</span><span id="cart-total">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-bold">تأكيد الطلب (واتساب)</button>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = [];
        let currentFilter = 'all';

        async function fetchProducts() {
            try {
                const response = await fetch('products.json?v=' + Date.now());
                productsData = await response.json();
                renderProducts(productsData);
            } catch (e) {
                // بيانات تجريبية في حال عدم وجود ملف JSON
                productsData = [
                    { id: 1, name: "قميص كلاسيك فاخر", price: 45, category: "men_clothing", image: "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=500", colors: ["white", "black"], sizes: ["M", "L", "XL"] },
                    { id: 2, name: "حذاء رياضي الترا", price: 89, category: "men_shoes", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500", colors: ["red", "black"], sizes: ["40", "42", "44"] }
                ];
                renderProducts(productsData);
            }
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card p-3 flex flex-col">
                    <img src="${Array.isArray(p.image) ? p.image[0] : p.image}" class="w-full h-48 object-cover rounded-xl mb-3">
                    <h3 class="text-sm font-bold mb-1 truncate">${p.name}</h3>
                    <p class="text-[#00BFFF] font-black mb-3">$${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-white/5 border border-white/10 py-2 rounded-lg text-xs hover:bg-[#00BFFF] hover:text-black transition">أضف للحقيبة</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function searchProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = productsData.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.category.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        }

        function filterProducts(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'all' ? productsData : productsData.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function addToCart(id) {
            const p = productsData.find(x => x.id === id);
            cart.push({...p, cartId: Date.now()});
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0;
            content.innerHTML = cart.map(item => {
                total += item.price;
                return `
                <div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center">
                    <img src="${Array.isArray(item.image) ? item.image[0] : item.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow"><p class="text-xs font-bold">${item.name}</p><p class="text-[#00BFFF] text-xs">$${item.price}</p></div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(x => x.cartId !== cartId);
            updateUI();
        }

        function sendOrderToWhatsApp() {
            if(cart.length === 0) return alert('الحقيبة فارغة');
            let msg = "طلب جديد:\n" + cart.map(i => `- ${i.name} ($${i.price})`).join('\n');
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        }

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        window.onload = () => {
            fetchProducts();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 800);
            }, 2000);
        };
    </script>
</body>
</html>
