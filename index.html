<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; margin: 0; padding: 0; }
        
        /* شريط الإعلانات المتحرك العلوي */
        .promo-bar { background: var(--primary); color: #000; overflow: hidden; white-space: nowrap; padding: 8px 0; font-weight: 900; font-size: 14px; position: fixed; top: 0; width: 100%; z-index: 100; box-shadow: 0 2px 10px rgba(0,191,255,0.3); }
        .promo-track { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* تنسيق الأقسام */
        .categories-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .categories-container::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 15px; font-size: 13px; font-weight: 700; white-space: nowrap; transition: 0.3s; color: #aaa; }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); transform: scale(1.05); }

        /* كود البطاقة والتنسيقات السابقة */
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); transition: all 0.4s; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .discount-badge { position: absolute; top: 10px; left: 10px; background: #ff3b30; color: #fff; padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; z-index: 10; }
        .qty-controls { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 5px; margin: 10px 0; }
        .option-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .option-dot.selected { border-color: #fff; box-shadow: 0 0 5px var(--primary); }
        .size-btn { background: #333; padding: 5px 10px; border-radius: 8px; font-size: 11px; }
        .size-btn.selected { background: #fff; color: #000; font-weight: 900; }

        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; flex-direction: column; }
        #image-viewer.active { display: flex; }
    </style>
</head>
<body class="pt-12">

    <div class="promo-bar">
        <div class="promo-track">
            💎 متجر ALMAZ: خصومات تصل إلى 50% على قسم الأحذية • أحدث صيحات الموضة العالمية وصلت الآن • شحن سريع لجميع المحافظات 💎
        </div>
    </div>

    <header class="container mx-auto px-4 py-4 sticky top-12 z-40 bg-[#1a1c1e]/80 backdrop-blur-lg flex justify-between items-center max-w-[95%]">
        <div class="text-3xl font-black italic tracking-tighter">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-3 bg-white/5 rounded-2xl border border-white/10">
            <i data-lucide="shopping-bag" class="text-[#00BFFF] w-6 h-6"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-2 max-w-[95%]">
        
        <div class="categories-container mb-6">
            <button class="cat-btn active" onclick="filterData('الكل', this)">الكل</button>
            <button class="cat-btn" onclick="filterData('ملابس رجالي', this)">ملابس رجالي</button>
            <button class="cat-btn" onclick="filterData('ملابس نسائي', this)">ملابس نسائي</button>
            <button class="cat-btn" onclick="filterData('احذيه رجالي', this)">احذيه رجالي</button>
            <button class="cat-btn" onclick="filterData('احذيه نسائيه', this)">احذيه نسائيه</button>
        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-24">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[400px] bg-[#1a1c1e] z-[100] translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">حقيبة التسوق</h2>
            <button id="close-cart" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t border-white/10 mt-4">
            <div class="flex justify-between mb-4 font-black text-xl">
                <span>الإجمالي:</span>
                <span id="cart-total" class="text-[#00BFFF]">$0</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-[#00BFFF] text-black py-4 rounded-2xl font-black shadow-lg shadow-[#00BFFF]/20">إرسال الطلب عبر واتساب</button>
        </div>
    </div>

    <div id="image-viewer">
        <button onclick="closeGallery()" class="absolute top-8 right-8 text-white"><i data-lucide="circle-x" class="w-10 h-10"></i></button>
        <img id="viewer-img" class="max-w-[90%] max-h-[70vh] rounded-3xl shadow-2xl">
        <div id="thumb-container" class="flex gap-3 mt-6"></div>
    </div>

    <script>
        let productsData = [];
        let cart = [];
        let currentCategory = 'الكل';
        window.tempSelections = {};

        async function loadProducts() {
            try {
                // ملاحظة: تأكد أن ملف products.json يحتوي على حقل "category" يطابق أسماء الأقسام أعلاه
                const res = await fetch('products.json?v=' + Date.now());
                productsData = await res.json();
                renderProducts(productsData);
            } catch (e) { console.error("Error loading JSON"); }
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => {
                const imgs = Array.isArray(p.image) ? p.image : [p.image];
                const hasDiscount = p.oldPrice > p.price;
                
                if (!window.tempSelections[p.id]) {
                    window.tempSelections[p.id] = { color: p.colors?.[0], size: p.sizes?.[0], qty: 1 };
                }

                return `
                <div class="product-card p-3">
                    ${hasDiscount ? `<div class="discount-badge">خصم %${Math.round((p.oldPrice-p.price)/p.oldPrice*100)}</div>` : ''}
                    <img src="${imgs[0]}" class="w-full h-48 object-cover rounded-2xl mb-3 cursor-zoom-in" onclick='openGallery(${JSON.stringify(imgs)})'>
                    
                    <h3 class="font-bold text-sm mb-1 truncate">${p.name}</h3>
                    <p class="text-[10px] text-gray-500 mb-2">${p.category}</p>
                    
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-[#00BFFF] font-black text-lg">$${p.price}</span>
                        ${hasDiscount ? `<span class="text-gray-500 line-through text-[11px]">$${p.oldPrice}</span>` : ''}
                    </div>

                    <div class="flex gap-2 mb-3">
                        ${(p.colors || []).map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="option-dot ${window.tempSelections[p.id].color===c?'selected':''}" style="background:${c}"></div>`).join('')}
                    </div>

                    <div class="flex flex-wrap gap-1 mb-3">
                        ${(p.sizes || []).map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="size-btn ${window.tempSelections[p.id].size===s?'selected':''}">${s}</button>`).join('')}
                    </div>

                    <div class="qty-controls">
                        <button onclick="updateQty(${p.id}, 1)" class="text-[#00BFFF] px-2"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        <span id="qty-${p.id}" class="font-bold">${window.tempSelections[p.id].qty}</span>
                        <button onclick="updateQty(${p.id}, -1)" class="text-[#00BFFF] px-2"><i data-lucide="minus" class="w-4 h-4"></i></button>
                    </div>

                    <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-3 rounded-xl font-bold text-xs mt-2 transition active:scale-90">إضافة للسلة</button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function filterData(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'الكل' ? productsData : productsData.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        window.selectOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.selected').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
        }

        window.updateQty = (id, delta) => {
            window.tempSelections[id].qty = Math.max(1, window.tempSelections[id].qty + delta);
            document.getElementById(`qty-${id}`).innerText = window.tempSelections[id].qty;
        }

        function addToCart(id) {
            const product = productsData.find(p => p.id === id);
            const selection = window.tempSelections[id];
            cart.push({ ...product, ...selection, cartId: Date.now() });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            const content = document.getElementById('cart-content');
            content.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                <div class="flex gap-4 bg-white/5 p-3 rounded-2xl items-center border border-white/5">
                    <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-grow">
                        <h4 class="font-bold text-xs">${item.name}</h4>
                        <p class="text-[10px] text-gray-400">${item.color} | المقاس: ${item.size} | الكمية: ${item.qty}</p>
                        <p class="text-[#00BFFF] font-black">$${item.price * item.qty}</p>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeFromCart = (cid) => {
            cart = cart.filter(x => x.cartId !== cid);
            updateCartUI();
        }

        function sendOrder() {
            if(cart.length === 0) return alert("السلة فارغة");
            let text = "🚀 *طلب جديد من متجر ALMAZ*\n\n";
            cart.forEach(i => {
                text += `• *${i.name}*\n  القسم: ${i.category}\n  اللون: ${i.color} | المقاس: ${i.size}\n  الكمية: ${i.qty} | السعر: $${i.price * i.qty}\n\n`;
            });
            text += `💰 *الإجمالي النهائي: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(text)}`);
        }

        window.openGallery = (imgs) => {
            const viewer = document.getElementById('image-viewer');
            const mainImg = document.getElementById('viewer-img');
            const thumbs = document.getElementById('thumb-container');
            mainImg.src = imgs[0];
            thumbs.innerHTML = imgs.map(img => `<img src="${img}" class="w-16 h-16 rounded-xl object-cover border-2 border-white/20 cursor-pointer" onclick="document.getElementById('viewer-img').src='${img}'">`).join('');
            viewer.classList.add('active');
        }

        window.closeGallery = () => document.getElementById('image-viewer').classList.remove('active');

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        window.onload = loadProducts;
    </script>
</body>
</html>
