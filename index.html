<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفضي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #FF7F00; 
            --bg-silver: #D1D5DB; /* الفضي الأساسي */
            --card-silver: #E5E7EB; /* فضي فاتح للكروت */
            --text-dark: #1F2937; 
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg-silver); 
            color: var(--text-dark); 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* شاشة الترحيب بالفضي */
        #splash-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #bdc3c7, #2c3e50); 
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; 
        }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 20px rgba(255,127,0,0.5); }

        /* الكروت باللون الفضي */
        .product-card { 
            background: var(--card-silver); 
            border-radius: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.4); 
            transition: 0.4s; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; 
            box-shadow: 8px 8px 16px #b8bcbf, -8px -8px 16px #ffffff; /* تأثير النيومورفيزم الفضي */
        }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        .discount-badge { position: absolute; top: 10px; left: 10px; background: #ff3b30; color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; z-index: 10; }

        /* التصنيفات */
        .category-btn { 
            white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 99px; font-size: 0.8rem; 
            background: #e0e0e0; border: 1px solid #cfcfcf; color: #4b5563; transition: 0.3s; 
        }
        .category-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 15px rgba(255,127,0,0.3); }

        /* شريط الإعلانات */
        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: white; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* سلة التسوق الجانبية - فضي داكن */
        #cart-sidebar { 
            position: fixed; top: 0; left: 0; h-full; width: 100%; md:width: 420px; 
            background: rgba(229, 231, 235, 0.95); backdrop-blur-xl; 
            z-index: 100; transform: translateX(100%); transition: 0.5s; padding: 1.5rem;
            border-right: 1px solid rgba(0,0,0,0.1);
        }
        #cart-sidebar.open { transform: translateX(0); }

        .qr-box { background: white; padding: 12px; border-radius: 1.5rem; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; }
    </style>
</head>
<body class="pt-10">

    <div id="splash-screen">
        <div class="splash-logo italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/20 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-orange-500 w-0" style="animation: loadSplash 2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-white/60 backdrop-blur-md rounded-2xl border border-white/40 flex justify-between items-center mt-2 max-w-[95%] shadow-lg">
        <div class="text-2xl font-black uppercase italic tracking-tighter text-gray-800">AL<span class="text-orange-500">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-gray-100 rounded-full border border-gray-200 hover:bg-orange-500 group transition">
            <i data-lucide="shopping-cart" class="text-orange-500 w-5 h-5 group-hover:text-white"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-gray-800 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-10">
        <div class="flex overflow-x-auto gap-2 mb-10 no-scrollbar pb-2">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
        </div>

        <div id="products-grid" class="product-grid grid grid-cols-2 md:grid-cols-4 gap-4 mb-24">
            </div>
    </main>

    <footer class="mt-24 py-20 border-t border-gray-300 bg-gray-200/50 text-center px-4">
        <h3 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-10">تواصل معنا عبر الرموز التالية</h3>
        <div class="flex flex-wrap justify-center gap-8">
            <div class="qr-box border-b-8 border-blue-500"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://t.me/hehehevve"></div>
            <div class="qr-box border-b-8 border-blue-700"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://facebook.com"></div>
        </div>
        <p class="mt-16 text-gray-400 text-[10px] tracking-widest">© 2026 ALMAZ SILVER STORE</p>
    </footer>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 shadow-2xl">
         </div>

    <script>
        // كود الجافا سكربت يبقى كما هو في النسخة السابقة لتشغيل الوظائف
        // تأكد من تحديث أسماء المتغيرات والألوان في السكربت إذا لزم الأمر
        window.addEventListener('load', () => {
            lucide.createIcons();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
            }, 2000);
        });
    </script>
</body>
</html>
