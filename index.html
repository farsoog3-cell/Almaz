<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #FF7F00; --bg-dark: #050505; --card-bg: #111111; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Loading Screen */
        #splash-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s opacity ease; }
        .splash-logo { font-size: 3rem; font-weight: 900; color: white; text-transform: uppercase; animation: pulse 2s infinite; }
        .splash-logo span { color: var(--primary); }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }

        /* Product Cards */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: var(--card-bg); border-radius: 1.25rem; border: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; position: relative; transition: 0.3s; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* Badges */
        .badge { position: absolute; z-index: 10; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; top: 10px; }
        .badge-new { left: 10px; background: var(--primary); color: black; }
        .badge-discount { right: 10px; background: #10b981; color: white; }

        /* Category Scroll */
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { white-space: nowrap; padding: 8px 18px; border-radius: 50px; font-size: 13px; border: 1px solid #222; color: #888; transition: 0.3s; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 700; }

        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; overflow: hidden; font-size: 11px; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .option-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #333; cursor: pointer; }
        .option-dot.selected { border: 2px solid white; box-shadow: 0 0 8px var(--primary); }
        .size-btn { padding: 4px 10px; border-radius: 6px; background: #1a1a1a; font-size: 10px; border: 1px solid #333; }
        .size-btn.selected { background: white; color: black; font-weight: 900; }
    </style>
</head>
<body class="pt-12">

    <div id="splash-screen"><div class="splash-logo italic">AL<span>MAZ</span></div></div>

    <div class="marquee"><div class="marquee-content uppercase tracking-widest">✨ تشكيلة العيد وصلت • شحن لجميع الولايات • جودة أصلية ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-8 z-50 bg-black/60 backdrop-blur-md rounded-2xl border border-white/5 flex justify-between items-center max-w-[95%]">
        <div class="text-xl font-black italic">AL<span class="text-orange-500">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-bag" class="text-orange-500 w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-8">
        <div class="category-scroll mb-8" id="cat-scroll">
            <button onclick="filterProducts('all', this)" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing', this)" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing', this)" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes', this)" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes', this)" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="product-grid mb-20"></div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 left-0 w-full md:w-96 bg-black z-[100] translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black text-orange-500 italic">حقيبة التسوق</h2>
            <button id="close-cart" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10 mt-4">
            <div class="flex justify-between text-xl font-black mb-6"><span>الإجمالي:</span><span id="cart-total" class="text-orange-500">$0</span></div>
            <button onclick="sendOrder()" class="w-full bg-orange-500 text-black py-4 rounded-xl font-black text-lg">طلب عبر واتساب ✅</button>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];
        let selections = {};

        async function init() {
            try {
                const res = await fetch('products.json?v=' + Date.now()); // منع الكاش
                if (!res.ok) throw new Error();
                products = await res.json();
                render();
            } catch (e) {
                document.getElementById('products-grid').innerHTML = `<p class="col-span-full text-center py-20 text-orange-500 font-bold">⚠️ تأكد من رفع ملف products.json</p>`;
            }
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1500);
            lucide.createIcons();
        }

        function render(data = products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => {
                // التعامل مع الصورة سواء كانت نص أو مصفوفة
                const img = Array.isArray(p.image) ? p.image[0] : p.image;
                const hasDiscount = p.oldPrice && p.oldPrice > p.price;
                const discVal = hasDiscount ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
                
                if (!selections[p.id]) selections[p.id] = { color: p.colors[0], size: p.sizes[0] };

                return `
                <div class="product-card p-3">
                    ${p.isNew ? '<div class="badge badge-new italic">NEW</div>' : ''}
                    ${hasDiscount ? `<div class="badge badge-discount">-%${discVal}</div>` : ''}
                    <div class="h-44 md:h-52 overflow-hidden rounded-xl mb-3 bg-neutral-900">
                        <img src="${img}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <h3 class="text-xs font-bold mb-1 truncate">${p.name}</h3>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-orange-500 font-black">$${p.price}</span>
                        ${hasDiscount ? `<span class="text-gray-600 text-[10px] line-through">$${p.oldPrice}</span>` : ''}
                    </div>
                    <div class="flex gap-1.5 mb-2 overflow-x-auto no-scrollbar">
                        ${p.colors.map(c => `<div onclick="updateSel(${p.id},'color','${c}',this)" class="option-dot ${selections[p.id].color === c ? 'selected' : ''}" style="background:${c}"></div>`).join('')}
                    </div>
                    <div class="flex gap-1 mb-4 overflow-x-auto no-scrollbar">
                        ${p.sizes.map(s => `<button onclick="updateSel(${p.id},'size','${s}',this)" class="size-btn ${selections[p.id].size === s ? 'selected' : ''}">${s}</button>`).join('')}
                    </div>
                    <button onclick="addToCart(${p.id})" class="w-full bg-orange-500 text-black py-2.5 rounded-lg font-black text-[11px] active:scale-95 transition">إضافة</button>
                </div>`;
            }).join('');
        }

        window.updateSel = (id, type, val, el) => {
            selections[id][type] = val;
            el.parentElement.querySelectorAll('.selected').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.addToCart = (id) => {
            const p = products.find(x => x.id === id);
            cart.push({ ...p, ...selections[id], cartId: Date.now() });
            updateCartUI();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-content').innerHTML = cart.map(item => {
                total += item.price;
                return `
                <div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center">
                    <img src="${Array.isArray(item.image) ? item.image[0] : item.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow text-[10px]">
                        <p class="font-bold text-white truncate w-32">${item.name}</p>
                        <p class="text-gray-400 mt-0.5">مقاس: ${item.size} | <span style="color:${item.color}">●</span></p>
                        <p class="text-orange-500 font-black mt-0.5">$${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeFromCart = (cid) => {
            cart = cart.filter(x => x.cartId !== cid);
            updateCartUI();
        };

        window.filterProducts = (cat, btn) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'all' ? products : products.filter(p => p.category === cat));
        };

        window.sendOrder = () => {
            if (!cart.length) return;
            let m = "🚀 *طلب جديد من Almaz Store*\n\n";
            cart.forEach((p, i) => m += `${i+1}. ${p.name}\n- المقاس: ${p.size}\n- اللون: ${p.color}\n- السعر: $${p.price}\n\n`);
            m += `💰 *الإجمالي: $${cart.reduce((a, b) => a + b.price, 0)}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(m)}`);
        };

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        init();
    </script>
</body>
</html>
