<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #FF7F00; --bg-dark: #050505; --card-bg: #111111; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* شاشة الترحيب الذكية */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .splash-logo {
            font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase;
            letter-spacing: -2px; opacity: 0; transform: scale(0.8);
            animation: introLogo 2s forwards;
        }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }
        @keyframes introLogo {
            0% { opacity: 0; transform: scale(0.8) blur(10px); }
            100% { opacity: 1; transform: scale(1) blur(0px); filter: drop-shadow(0 0 20px rgba(255,127,0,0.5)); }
        }

        /* تنسيقات المنتجات والتجاوب */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: var(--card-bg); border-radius: 1.2rem; border: 1px solid #1a1a1a; transition: 0.4s; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* أزرار الأقسام القابلة للسحب */
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .category-btn { white-space: nowrap; padding: 0.5rem 1.2rem; border-radius: 99px; font-size: 0.75rem; border: 1px solid #222; color: #888; transition: 0.3s; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 800; }

        /* نافذة الصور */
        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #image-viewer.active { display: flex; }

        /* شريط الإعلانات */
        .marquee { background: var(--primary); height: 24px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.65rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الباركود الواضح */
        .qr-box { background: white; padding: 12px; border-radius: 1.5rem; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        .qr-box img { width: 140px; height: 140px; display: block; }
        @media (max-width: 640px) { .qr-box img { width: 110px; height: 110px; } }
    </style>
</head>
<body class="pt-10">

    <div id="splash-screen">
        <div class="splash-logo">AL<span>MAZ</span></div>
        <div class="w-32 h-1 bg-white/10 mt-4 rounded-full overflow-hidden">
            <div class="h-full bg-orange-500 w-0" style="animation: load 2.2s forwards"></div>
        </div>
        <style> @keyframes load { 100% { width: 100%; } } </style>
    </div>

    <div class="marquee"><div class="marquee-content uppercase">✨ شحن سريع لجميع الولايات • جودة ألماس مضمونة • تشكيلة 2026 الجديدة وصلت الآن ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-black/80 backdrop-blur-lg rounded-2xl border border-white/5 flex justify-between items-center mt-2 max-w-[95%]">
        <div class="text-xl font-black uppercase tracking-tighter italic">AL<span class="text-orange-500">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2 bg-white/5 rounded-full border border-white/10 transition active:scale-90">
            <i data-lucide="shopping-cart" class="text-orange-500 w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-8">
        <div class="category-scroll no-scrollbar mb-8">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="product-grid mb-20"></div>
    </main>

    <footer class="mt-20 py-16 border-t border-white/5 bg-black text-center px-4">
        <h3 class="text-orange-500 font-bold text-xs uppercase tracking-[0.3em] mb-12">مسح الرمز للتواصل المباشر</h3>
        
        <div class="flex flex-wrap justify-center gap-6 md:gap-12 max-w-5xl mx-auto">
            
            <div class="flex flex-col items-center">
                <div class="qr-box border-b-4 border-blue-500">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/hehehevve" alt="Telegram QR">
                </div>
                <div class="mt-4 flex items-center gap-2 text-blue-400 font-bold text-[11px] uppercase">
                    <i data-lucide="send" class="w-4 h-4"></i> تلغرام
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div class="qr-box border-b-4 border-blue-700">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.facebook.com/share/18coFiPjCh/" alt="FB Page QR">
                </div>
                <div class="mt-4 flex items-center gap-2 text-blue-600 font-bold text-[11px] uppercase">
                    <i data-lucide="facebook" class="w-4 h-4"></i> الصفحة الرئيسية
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div class="qr-box border-b-4 border-blue-900">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.facebook.com/share/1CDeh3LeQ5/" alt="FB Profile QR">
                </div>
                <div class="mt-4 flex items-center gap-2 text-blue-800 font-bold text-[11px] uppercase">
                    <i data-lucide="user" class="w-4 h-4"></i> الحساب الشخصي
                </div>
            </div>

        </div>
        
        <p class="mt-20 opacity-20 text-[10px] tracking-[0.5em]">© 2026 ALMAZ STORE - PREMIUM QUALITY</p>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[400px] bg-black/95 backdrop-blur-2xl z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/5">
        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <h2 class="text-xl font-black text-orange-500 uppercase">السلة</h2>
            <button id="close-cart" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-4 font-black text-xl"><span>الإجمالي:</span><span id="cart-total" class="text-orange-500">₺0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-orange-500 text-black py-4 rounded-xl font-black transition active:scale-95 shadow-xl shadow-orange-500/20">إرسال الطلب (واتساب)</button>
        </div>
    </div>

    <div id="image-viewer" onclick="this.classList.remove('active')"><img id="viewer-img" class="max-w-[90%] max-h-[80vh] rounded-xl shadow-2xl border border-white/10"></div>

    <script>
        // اخفاء شاشة الترحيب
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                document.body.style.overflow = 'auto';
            }, 2500);
        });

        const productsData = [
            { id: 1, name: "تيشيرت رجالي فخم", price: 450, category: "men_clothing", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600", colors: ['#FFF', '#000'], sizes: ['M', 'L', 'XL'] },
            { id: 2, name: "فستان سهرة أسود", price: 1200, category: "women_clothing", image: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=600", colors: ['#000', '#FF0000'], sizes: ['S', 'M', 'L'] },
            { id: 3, name: "حذاء رياضي نيون", price: 980, category: "men_shoes", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600", colors: ['#FF0000', '#000'], sizes: ['41', '42', '43'] },
            { id: 4, name: "كعب نسائي أنيق", price: 850, category: "women_shoes", image: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=600", colors: ['#FFF', '#FFD700'], sizes: ['37', '38', '39'] },
            { id: 5, name: "هودي نسائي تركي", price: 750, category: "women_clothing", image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600", colors: ['#E0C3FC', '#000'], sizes: ['M', 'L'] },
            { id: 6, name: "بنطال جينز رجالي", price: 600, category: "men_clothing", image: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=600", colors: ['#0000FF', '#000'], sizes: ['32', '34', '36'] }
        ];

        let cart = [];
        window.selectedOptions = {};
        lucide.createIcons();

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? productsData : productsData.filter(p => p.category === filter);

            filtered.forEach(p => {
                if (!window.selectedOptions[p.id]) window.selectedOptions[p.id] = { color: p.colors[0], size: p.sizes[0] };
                grid.innerHTML += `
                    <div class="product-card p-3 flex flex-col">
                        <img src="${p.image}" class="w-full h-40 md:h-52 object-cover rounded-xl mb-3 cursor-pointer" onclick="viewImage('${p.image}')">
                        <h3 class="font-bold text-[11px] md:text-sm mb-1 truncate">${p.name}</h3>
                        <span class="text-orange-500 font-black text-xs md:text-lg mb-2">₺${p.price}</span>
                        
                        <div class="flex gap-2 mb-3">
                            ${p.colors.map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="w-3.5 h-3.5 md:w-5 md:h-5 rounded-full border border-white/20 cursor-pointer transition ${window.selectedOptions[p.id].color===c?'scale-125 border-white ring-2 ring-orange-500':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        
                        <div class="flex flex-wrap gap-1 mb-4">
                            ${p.sizes.map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="text-[9px] md:text-[10px] px-2 py-0.5 border border-white/10 rounded transition ${window.selectedOptions[p.id].size===s?'bg-white text-black font-bold':''}">${s}</button>`).join('')}
                        </div>
                        
                        <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-orange-500 text-black py-2 md:py-3 rounded-lg font-black text-[10px] md:text-xs active:scale-90 transition shadow-lg shadow-orange-500/10">إضافة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.viewImage = (src) => {
            const viewer = document.getElementById('image-viewer');
            document.getElementById('viewer-img').src = src;
            viewer.classList.add('active');
        };

        window.selectOpt = (id, type, val, el) => {
            window.selectedOptions[id][type] = val;
            renderProducts(document.querySelector('.category-btn.active').innerText === 'الكل' ? 'all' : 'all'); // تحديث سريع
        };

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            cart.push({ ...p, ...window.selectedOptions[id], cartId: Date.now() });
            updateUI();
        };

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            content.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                content.innerHTML += `
                <div class="flex gap-3 bg-white/5 p-2 rounded-xl border border-white/5 items-center">
                    <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow text-[10px]"><p class="font-bold text-white">${item.name}</p><p class="text-orange-500 font-bold">₺${item.price}</p></div>
                    <button onclick="cart = cart.filter(x => x.cartId !== ${item.cartId}); updateUI();" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            });
            document.getElementById('cart-total').innerText = `₺${total}`;
            lucide.createIcons();
        }

        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderProducts(cat);
        };

        window.sendOrderToWhatsApp = () => {
            if(cart.length === 0) return alert('السلة فارغة!');
            let msg = "🚀 *طلب جديد من Almaz Store*\n\n";
            cart.forEach((p, i) => msg += `📦 *${i+1}. ${p.name}* (${p.size})\n`);
            msg += `\n💰 *الإجمالي: ₺${cart.reduce((a, b) => a + b.price, 0)}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`, '_blank');
        };

        renderProducts('all');
    </script>
</body>
</html>
