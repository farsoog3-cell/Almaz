<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | المتجر المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: 3rem; font-weight: 900; color: white; animation: intro 2s forwards; }

        /* شارة الخصم */
        .discount-badge { position: absolute; top: 12px; left: 12px; background: #ff3b30; color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 20; box-shadow: 0 4px 10px rgba(255,59,48,0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* السلايدر */
        .slider-container { width: 95%; max-width: 1200px; margin: 10px auto 25px; position: relative; overflow: hidden; border-radius: 20px; aspect-ratio: 16/8; border: 1px solid var(--border-color); background: #000; }
        .slider-track { display: flex; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* البحث والأقسام */
        .search-wrapper { max-width: 600px; margin: 20px auto; padding: 0 20px; position: relative; }
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px 45px 14px 20px; border-radius: 18px; color: white; outline: none; }
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { white-space: nowrap; padding: 10px 20px; border-radius: 99px; font-size: 0.8rem; background: var(--card-bg); border: 1px solid var(--border-color); color: #aaa; }
        .category-btn.active { background: var(--primary); color: black; font-weight: 900; }

        /* المنتج */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); padding: 10px; transition: 0.4s; position: relative; overflow: hidden; }
        
        .qty-controls { display: flex; align-items: center; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 5px; border: 1px solid var(--border-color); margin-bottom: 10px; }
        .option-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .option-dot.selected { border-color: white; box-shadow: 0 0 8px var(--primary); }
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 8px; font-size: 11px; }
        .size-btn.selected { background: white; color: black; font-weight: 900; }

        /* الشريط العلوي */
        .marquee { background: var(--primary); height: 28px; position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; overflow: hidden; font-size: 0.75rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollText 25s linear infinite; display: inline-block; }
        @keyframes scrollText { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="pt-12">

    <div id="splash-screen">
        <div class="splash-logo italic text-white">AL<span class="text-[#00BFFF]">MAZ</span></div>
    </div>

    <div class="marquee"><div id="marquee-text" class="marquee-content">✨ جارِ تحميل أحدث العروض... ✨</div></div>

    <header class="mx-auto px-4 py-3 sticky top-8 z-40 bg-zinc-800/80 backdrop-blur-lg rounded-2xl border border-white/5 flex justify-between items-center max-w-[94%] shadow-xl">
        <div class="text-xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4.5 h-4.5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div class="search-wrapper">
        <i data-lucide="search" class="absolute right-8 top-1/2 -translate-y-1/2 text-[#00BFFF] w-5 h-5"></i>
        <input type="text" id="search-input" class="search-bar" placeholder="ابحث هنا..." oninput="handleSearch()">
    </div>

    <section id="slider-section" class="hidden"><div class="slider-container"><div id="slider-track" class="slider-track"></div></div></section>

    <main class="px-4">
        <div class="category-scroll no-scrollbar" id="cat-list">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
            <button onclick="filterProducts('sport_shoes')" class="category-btn">أحذية رياضية</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
        </div>
        <div id="products-grid" class="product-grid mt-6 mb-24"></div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[400px] bg-zinc-900/98 z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-xl font-black text-[#00BFFF]">سلة الطلبات</h2>
            <button id="close-cart" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-4 font-black text-xl"><span>الإجمالي:</span><span id="cart-total" class="text-[#00BFFF]">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black">إرسال الطلب واتساب ✅</button>
        </div>
    </div>

    <div id="image-viewer">
        <button onclick="this.parentElement.style.display='none'" class="absolute top-10 right-10 text-white"><i data-lucide="x" class="w-10 h-10"></i></button>
        <img id="viewer-img" class="max-w-[90%] max-h-[70vh] rounded-2xl object-contain">
    </div>

    <script>
        let productsData = [], cart = [];
        window.tempSelections = {};

        async function loadAll() {
            try {
                const [sRes, lRes, pRes] = await Promise.all([
                    fetch('settings.json?v='+Date.now()),
                    fetch('slides.json?v='+Date.now()),
                    fetch('products.json?v='+Date.now())
                ]);
                const sData = await sRes.json();
                document.getElementById('marquee-text').innerText = sData.marquee;
                
                const lData = await lRes.json();
                if(lData.length > 0) {
                    const track = document.getElementById('slider-track');
                    lData.forEach(s => track.innerHTML += `<div class="slide"><img src="${s.image}"></div>`);
                    document.getElementById('slider-section').classList.remove('hidden');
                    let cur = 0; setInterval(() => { cur = (cur+1)%lData.length; track.style.transform = `translateX(${cur*100}%)`; }, 4000);
                }

                productsData = await pRes.json();
                renderProducts(productsData);
            } catch(e) {}
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                if (!window.tempSelections[p.id]) window.tempSelections[p.id] = { color: p.colors?.[0]||'', size: p.sizes?.[0]||'', qty: 1 };
                
                // حساب الخصم
                const hasDiscount = p.oldPrice && p.oldPrice > p.price;
                const discountPerc = hasDiscount ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
                const imgs = Array.isArray(p.image) ? p.image : [p.image];

                grid.innerHTML += `
                    <div class="product-card">
                        ${hasDiscount ? `<div class="discount-badge">خصم ${discountPerc}%-</div>` : ''}
                        <img src="${imgs[0]}" onclick="openImg('${imgs[0]}')" class="w-full h-44 object-cover rounded-xl mb-3 cursor-pointer">
                        <h3 class="font-bold text-[11px] mb-1 truncate">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[#00BFFF] font-black text-sm">$${p.price}</span>
                            ${hasDiscount ? `<span class="text-gray-500 line-through text-[10px]">$${p.oldPrice}</span>` : ''}
                        </div>
                        <div class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar">
                            ${(p.colors||[]).map(c => `<div onclick="upOpt(${p.id},'color','${c}',this)" class="option-dot ${window.tempSelections[p.id].color===c?'selected':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1 mb-4">
                            ${(p.sizes||[]).map(s => `<button onclick="upOpt(${p.id},'size','${s}',this)" class="size-btn ${window.tempSelections[p.id].size===s?'selected':''}">${s}</button>`).join('')}
                        </div>
                        <div class="qty-controls">
                            <button onclick="chQty(${p.id},-1)" class="qty-btn">-</button>
                            <span id="q-${p.id}" class="flex-grow text-center text-xs font-black">1</span>
                            <button onclick="chQty(${p.id},1)" class="qty-btn">+</button>
                        </div>
                        <button onclick="add(${p.id})" class="w-full bg-[#00BFFF] text-black py-3 rounded-xl font-black text-[10px]">إضافة للسلة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.upOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.option-dot, .size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.chQty = (id, d) => {
            let q = window.tempSelections[id].qty + d;
            if(q < 1) q = 1;
            window.tempSelections[id].qty = q;
            document.getElementById(`q-${id}`).innerText = q;
        };

        window.add = (id) => {
            const p = productsData.find(x => x.id === id);
            const s = window.tempSelections[id];
            cart.push({...p, ...s, img: Array.isArray(p.image)?p.image[0]:p.image, cartId: Date.now()});
            updateUI();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cont = document.getElementById('cart-content');
            let total = 0; cont.innerHTML = '';
            cart.forEach(i => {
                total += (i.price * i.qty);
                cont.innerHTML += `<div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center border border-white/5">
                    <img src="${i.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow"><p class="text-[10px] font-bold">${i.name}</p><p class="text-[9px] text-gray-400">${i.qty} قطع | ${i.size}</p></div>
                    <button onclick="cart=cart.filter(x=>x.cartId!==${i.cartId});updateUI();" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            });
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.handleSearch = () => {
            const t = document.getElementById('search-input').value.toLowerCase();
            renderProducts(productsData.filter(p => p.name.toLowerCase().includes(t)));
        };

        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat==='all'?productsData : productsData.filter(p => p.category === cat));
        };

        window.openImg = (u) => { document.getElementById('viewer-img').src=u; document.getElementById('image-viewer').style.display='flex'; };

        window.sendOrderToWhatsApp = () => {
            let m = "🚀 *طلب جديد Almaz Store*\n\n";
            cart.forEach(p => m += `• ${p.name} | العدد: ${p.qty} | مقاس: ${p.size}\n`);
            m += `\n💰 الإجمالي: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(m)}`);
        };

        window.onload = () => { loadAll(); setTimeout(() => document.getElementById('splash-screen').style.display='none', 2000); };
        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
    </script>
</body>
</html>
