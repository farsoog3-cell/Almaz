<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almaz Store | متجر الألماس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #FF7F00; --bg-dark: #050505; --card-bg: #111111; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow: hidden; }
        
        /* شاشة الترحيب */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .splash-logo {
            font-size: 5rem; font-weight: 900; color: white; text-transform: uppercase;
            letter-spacing: -4px; opacity: 0; transform: scale(0.8);
            animation: introLogo 2s forwards;
        }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }
        @keyframes introLogo {
            0% { opacity: 0; transform: scale(0.8) blur(10px); }
            50% { opacity: 1; transform: scale(1.05) blur(0px); }
            100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,127,0,0.5)); }
        }
        .splash-loader { width: 200px; height: 2px; background: #1a1a1a; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .splash-loader div { width: 0%; height: 100%; background: var(--primary); animation: loadBar 2.2s forwards ease-in-out; }
        @keyframes loadBar { 100% { width: 100%; } }

        /* تأثيرات البطاقات والأزرار */
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid #1a1a1a; transition: all 0.4s ease; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(255, 127, 0, 0.1); }
        .category-btn { white-space: nowrap; transition: 0.3s; border: 1px solid #222; padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.8rem; color: #777; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 800; box-shadow: 0 4px 15px rgba(255,127,0,0.3); }
        
        /* عارض الصور */
        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(15px); cursor: zoom-out; animation: fadeIn 0.4s ease; }
        #image-viewer.active { display: flex; }
        #image-viewer img { max-width: 90%; max-height: 80vh; border-radius: 1.5rem; border: 1px solid rgba(255,127,0,0.3); transform: scale(0.9); transition: 0.3s; }
        #image-viewer.active img { transform: scale(1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .marquee-container { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: marquee 18s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">AL<span>MAZ</span></div>
        <div class="splash-loader"><div></div></div>
        <p class="text-[10px] mt-6 tracking-[0.6em] text-gray-500 uppercase font-light">Elegance Redefined</p>
    </div>

    <div class="marquee-container">
        <div class="marquee-content uppercase">✨ شحن سريع لجميع الولايات • جودة ألماس مضمونة • تشكيلة نسائية ورجالية جديدة لعام 2026 ✨</div>
    </div>

    <header class="container mx-auto px-4 py-3 sticky top-8 z-40 bg-black/70 backdrop-blur-xl rounded-2xl border border-white/5 flex justify-between items-center mt-2 max-w-[92%] shadow-2xl">
        <div class="text-xl font-black tracking-tighter uppercase"><span class="bg-orange-500 text-black px-2 py-0.5 rounded-lg mr-1">AL</span>maz</div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 hover:bg-orange-500/10 transition-all active:scale-90">
            <i data-lucide="shopping-cart" class="text-orange-500 w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-12">
        <div id="categories" class="flex overflow-x-auto gap-3 pb-6 no-scrollbar justify-start md:justify-center">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 mb-20"></div>
    </main>

    <div id="image-viewer" onclick="this.classList.remove('active')">
        <img id="viewer-img" src="" alt="عرض المنتج">
    </div>

    <footer class="mt-20 border-t border-white/5 bg-gradient-to-b from-transparent to-black/50">
        <div class="container mx-auto px-6 py-16">
            <div class="flex flex-col items-center">
                <div class="mb-12 text-center group">
                    <div class="text-3xl font-black uppercase tracking-tighter mb-2 group-hover:text-orange-500 transition-colors">
                        AL<span class="text-orange-500 group-hover:text-white transition-colors">MAZ</span>
                    </div>
                    <p class="text-[10px] text-gray-600 tracking-[0.4em] uppercase">Premium Selection</p>
                </div>

                <div class="grid grid-cols-3 gap-6 md:gap-12 max-w-2xl w-full mb-16">
                    <div class="flex flex-col items-center group cursor-pointer" onclick="window.open('https://t.me/hehehevve')">
                        <div class="relative p-3 bg-white/5 border border-white/10 rounded-3xl backdrop-blur-md transition-all duration-500 group-hover:border-blue-500/50 group-hover:bg-blue-500/10 group-hover:-translate-y-2">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://t.me/hehehevve" class="w-20 h-20 md:w-28 md:h-28 rounded-2xl grayscale group-hover:grayscale-0 transition-all duration-500">
                            <div class="absolute -top-3 -right-3 bg-blue-500 p-2 rounded-xl shadow-xl shadow-blue-500/20"><i data-lucide="send" class="w-3 h-3 text-white"></i></div>
                        </div>
                        <span class="mt-4 text-[10px] font-bold text-gray-500 group-hover:text-blue-400 uppercase tracking-widest">Telegram</span>
                    </div>
                    <div class="flex flex-col items-center group cursor-pointer" onclick="window.open('https://www.facebook.com/share/18coFiPjCh/')">
                        <div class="relative p-3 bg-white/5 border border-white/10 rounded-3xl backdrop-blur-md transition-all duration-500 group-hover:border-[#1877F2]/50 group-hover:bg-[#1877F2]/10 group-hover:-translate-y-2">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://www.facebook.com/share/18coFiPjCh/" class="w-20 h-20 md:w-28 md:h-28 rounded-2xl grayscale group-hover:grayscale-0 transition-all duration-500">
                            <div class="absolute -top-3 -right-3 bg-[#1877F2] p-2 rounded-xl shadow-xl shadow-[#1877F2]/20"><i data-lucide="facebook" class="w-3 h-3 text-white"></i></div>
                        </div>
                        <span class="mt-4 text-[10px] font-bold text-gray-500 group-hover:text-[#1877F2] uppercase tracking-widest">FB Page</span>
                    </div>
                    <div class="flex flex-col items-center group cursor-pointer" onclick="window.open('https://www.facebook.com/share/1CDeh3LeQ5/')">
                        <div class="relative p-3 bg-white/5 border border-white/10 rounded-3xl backdrop-blur-md transition-all duration-500 group-hover:border-[#0064E0]/50 group-hover:bg-[#0064E0]/10 group-hover:-translate-y-2">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://www.facebook.com/share/1CDeh3LeQ5/" class="w-20 h-20 md:w-28 md:h-28 rounded-2xl grayscale group-hover:grayscale-0 transition-all duration-500">
                            <div class="absolute -top-3 -right-3 bg-[#0064E0] p-2 rounded-xl shadow-xl shadow-[#0064E0]/20"><i data-lucide="user" class="w-3 h-3 text-white"></i></div>
                        </div>
                        <span class="mt-4 text-[10px] font-bold text-gray-500 group-hover:text-[#0064E0] uppercase tracking-widest">FB Profile</span>
                    </div>
                </div>

                <div class="flex gap-8 text-gray-600 mb-8">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                    <i data-lucide="truck" class="w-5 h-5"></i>
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </div>
                <p class="text-[9px] text-gray-700 tracking-[0.5em] uppercase">© 2026 ALMAZ STORE • High Quality Only</p>
            </div>
        </div>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[380px] bg-black/98 backdrop-blur-2xl z-50 translate-x-full transition-transform duration-500 p-8 flex flex-col border-r border-white/5">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-5">
            <h2 class="text-xl font-black text-orange-500 uppercase">سلة المشتريات</h2>
            <button id="close-cart" class="hover:rotate-90 transition-all duration-300"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-8 border-t border-white/5 mt-auto">
            <div class="flex justify-between mb-6 font-black text-xl"><span>الإجمالي:</span><span id="cart-total" class="text-orange-500 text-2xl">₺0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-orange-500 hover:bg-orange-400 text-black py-4 rounded-2xl font-black text-sm uppercase flex justify-center gap-3 transition-all shadow-2xl shadow-orange-500/20 active:scale-95">إرسال الطلب عبر واتساب <i data-lucide="send" class="w-4 h-4"></i></button>
        </div>
    </div>

    <script>
        // التعامل مع شاشة التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                splash.style.transform = 'translateY(-100%)';
                document.body.style.overflow = 'auto';
            }, 2600);
        });

        const productsData = [
            { id: 1, name: "تيشيرت رجالي قطن", price: 450, category: "men_clothing", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600", colors: ['#FFF', '#000'], sizes: ['M', 'L', 'XL'] },
            { id: 2, name: "فستان سهرة ناعم", price: 1200, category: "women_clothing", image: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=600", colors: ['#FF0000', '#000'], sizes: ['S', 'M', 'L'] },
            { id: 3, name: "سنيكرز برو ماكس", price: 980, category: "men_shoes", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600", colors: ['#FF0000', '#000'], sizes: ['41', '42', '43'] },
            { id: 4, name: "حذاء كعب أنيق", price: 850, category: "women_shoes", image: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=600", colors: ['#FFF', '#F5E1FD'], sizes: ['37', '38', '39'] },
            { id: 5, name: "هودي نسائي عصري", price: 750, category: "women_clothing", image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600", colors: ['#E0C3FC', '#000'], sizes: ['M', 'L'] },
            { id: 6, name: "طقم كاجوال رجالي", price: 1100, category: "men_clothing", image: "https://images.unsplash.com/photo-1516257984877-a03a80476661?w=600", colors: ['#2F4F4F', '#000'], sizes: ['L', 'XL'] }
        ];

        let cart = [];
        window.selectedOptions = {};
        lucide.createIcons();

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        window.viewImage = (src) => {
            const viewer = document.getElementById('image-viewer');
            document.getElementById('viewer-img').src = src;
            viewer.classList.add('active');
        };

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? productsData : productsData.filter(p => p.category === filter);

            filtered.forEach(p => {
                if (!window.selectedOptions[p.id]) window.selectedOptions[p.id] = { color: p.colors[0], size: p.sizes[0] };
                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col group">
                        <div class="relative overflow-hidden rounded-2xl mb-4 cursor-pointer" onclick="viewImage('${p.image}')">
                            <img src="${p.image}" class="w-full h-52 object-cover transition duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center backdrop-blur-[2px]">
                                <i data-lucide="maximize-2" class="text-white w-7 h-7"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-sm mb-1 truncate">${p.name}</h3>
                        <span class="text-orange-500 font-black text-lg mb-4">₺${p.price}</span>
                        <div class="flex gap-2.5 mb-4">
                            ${p.colors.map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="w-5 h-5 rounded-full border border-white/10 cursor-pointer transition-all ${window.selectedOptions[p.id].color===c?'scale-125 ring-2 ring-orange-500 ring-offset-2 ring-offset-black':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1.5 mb-5">
                            ${p.sizes.map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="text-[10px] px-2.5 py-1 border border-white/10 rounded-lg transition-all ${window.selectedOptions[p.id].size===s?'bg-white text-black font-black':'hover:border-orange-500'}">${s}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-orange-500 hover:bg-orange-400 text-black py-3 rounded-xl font-black text-[11px] active:scale-90 transition-all shadow-lg shadow-orange-500/10">إضافة للسلة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.selectOpt = (id, type, val, el) => {
            window.selectedOptions[id][type] = val;
            renderProducts(document.querySelector('.category-btn.active').getAttribute('onclick').match(/'([^']+)'/)[1]);
        };

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            cart.push({ ...p, ...window.selectedOptions[id], cartId: Date.now() });
            updateUI();
            const btn = document.getElementById('toggle-cart');
            btn.classList.add('bg-orange-500', 'scale-110');
            setTimeout(() => btn.classList.remove('bg-orange-500', 'scale-110'), 400);
        };

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            content.innerHTML = cart.length ? '' : '<div class="text-center opacity-10 py-20"><i data-lucide="shopping-cart" class="w-20 h-20 mx-auto"></i></div>';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                content.innerHTML += `
                <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/5 items-center group">
                    <img src="${item.image}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-grow text-xs">
                        <p class="font-bold text-white text-sm mb-1">${item.name}</p>
                        <p class="text-orange-500 font-bold text-md">₺${item.price}</p>
                        <p class="text-gray-500 mt-1 uppercase text-[9px]">مقاس: ${item.size}</p>
                    </div>
                    <button onclick="cart = cart.filter(x => x.cartId !== ${item.cartId}); updateUI();" class="text-red-500/40 hover:text-red-500 p-2 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>`;
            });
            document.getElementById('cart-total').innerText = `₺${total}`;
            lucide.createIcons();
        }

        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderProducts(cat);
        };

        window.sendOrderToWhatsApp = () => {
            if(cart.length === 0) return alert('السلة فارغة!');
            let msg = "🚀 *طلب جديد من Almaz Store*\n\n";
            cart.forEach((p, i) => msg += `📦 *${i+1}. ${p.name}*\n📏 المقاس: ${p.size}\n💰 السعر: ₺${p.price}\n\n`);
            msg += `💰 *الإجمالي النهائي: ₺${cart.reduce((a, b) => a + b.price, 0)}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`, '_blank');
        };

        renderProducts('all');
    </script>
</body>
</html>
