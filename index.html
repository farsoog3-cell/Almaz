<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }

        /* شريط الإعلان من اليسار لليمن */
        .marquee { background: var(--primary); height: 30px; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; align-items: center; overflow: hidden; }
        .marquee-content { white-space: nowrap; animation: scrollLeftToRight 20s linear infinite; color: black; font-weight: 900; font-size: 13px; }
        @keyframes scrollLeftToRight { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(100%); } 
        }

        /* السلايدر بنظام التلاشي (Fade) - الأكثر استقراراً */
        .slider-container { width: 92%; margin: 20px auto; position: relative; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.1); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease-in-out; }
        .slide.active { opacity: 1; z-index: 10; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* الكروت وتنسيقها */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .product-card { background: var(--card-bg); border-radius: 20px; padding: 10px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); height: 100%; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; cursor: zoom-in; }
        
        .option-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .option-dot.selected { border-color: white; box-shadow: 0 0 5px var(--primary); }
        
        .size-btn { background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .size-btn.selected { background: var(--primary); color: black; font-weight: bold; }

        .qty-control { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 5px 10px; margin-top: 10px; }
        .qty-btn { width: 25px; height: 25px; background: rgba(255,255,255,0.1); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* المودال */
        #image-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        
        .hidden { display: none !important; }
        .category-btn.active { background: var(--primary); color: black; font-weight: bold; }
    </style>
</head>
<body class="pt-10">

    <div class="marquee">
        <div id="marquee-text" class="marquee-content">✨ أهلاً بكم في متجر المظ - عروض حصرية وتوصيل سريع ✨</div>
    </div>

    <header class="flex justify-between items-center px-5 py-4 sticky top-10 bg-[#1a1c1e]/80 backdrop-blur-md z-[500]">
        <div class="text-2xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button onclick="toggleCart()" class="relative p-2 bg-white/5 rounded-full">
            <i data-lucide="shopping-cart" class="text-[#00BFFF]"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <section id="slider-section" class="slider-container">
        <div id="slider-track"></div>
    </section>

    <div class="px-5 mb-5">
        <input type="text" id="search-input" oninput="handleSearch()" placeholder="ابحث عن منتج..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#00BFFF]">
        <div class="flex gap-2 overflow-x-auto py-4 no-scrollbar">
            <button onclick="filterProducts('all', event)" class="category-btn active px-6 py-2 rounded-full bg-white/5 border border-white/10 whitespace-nowrap">الكل</button>
            <button onclick="filterProducts('men_shoes', event)" class="category-btn px-6 py-2 rounded-full bg-white/5 border border-white/10 whitespace-nowrap">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes', event)" class="category-btn px-6 py-2 rounded-full bg-white/5 border border-white/10 whitespace-nowrap">أحذية نسائي</button>
        </div>
    </div>

    <div id="products-grid" class="product-grid"></div>

    <div id="image-modal" onclick="closeImageModal()">
        <button class="absolute top-5 right-5 text-white"><i data-lucide="x" class="w-8 h-8"></i></button>
        <img id="modal-img" class="max-w-[90%] max-h-[80vh] rounded-lg shadow-2xl">
    </div>

    <div id="cart-sidebar" class="fixed inset-y-0 left-0 w-full md:w-96 bg-zinc-900 z-[2000] translate-x-full transition-transform border-r border-white/10 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-bold">سلة التسوق</h2>
            <button onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="pt-5 border-t border-white/10">
            <div class="flex justify-between text-xl font-bold mb-4"><span>الإجمالي:</span><span id="cart-total">$0</span></div>
            <button onclick="sendWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-bold">طلب عبر واتساب</button>
        </div>
    </div>

    <script>
        let products = [], cart = [], slides = [];
        window.selections = {};

        async function start() {
            try {
                const [pRes, sRes] = await Promise.all([
                    fetch('products.json?v='+Date.now()),
                    fetch('slides.json?v='+Date.now())
                ]);
                products = await pRes.json();
                slides = await sRes.json();
                
                renderSlides();
                renderProducts(products);
                lucide.createIcons();
            } catch(e) { console.error("Data error", e); }
        }

        function renderSlides() {
            const track = document.getElementById('slider-track');
            track.innerHTML = slides.map((s, i) => `
                <div class="slide ${i === 0 ? 'active' : ''}"><img src="${s.image}"></div>
            `).join('');
            
            let cur = 0;
            setInterval(() => {
                const items = document.querySelectorAll('.slide');
                if(!items.length) return;
                items[cur].classList.remove('active');
                cur = (cur + 1) % items.length;
                items[cur].classList.add('active');
            }, 4000);
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => {
                if(!window.selections[p.id]) window.selections[p.id] = { color: p.colors?.[0]||'', size: p.sizes?.[0]||'', qty: 1 };
                const s = window.selections[p.id];
                
                return `
                <div class="product-card">
                    <img src="${Array.isArray(p.image)?p.image[0]:p.image}" onclick="openImg('${Array.isArray(p.image)?p.image[0]:p.image}')" class="product-img">
                    <h3 class="text-xs font-bold mt-3 line-clamp-1">${p.name}</h3>
                    <div class="text-[#00BFFF] font-black text-lg mt-1">$${p.price}</div>
                    
                    <div class="flex gap-2 mt-3 overflow-x-auto no-scrollbar">
                        ${(p.colors||[]).map(c => `<div onclick="updateSel(${p.id},'color','${c}',this)" class="option-dot ${s.color===c?'selected':''}" style="background:${c}"></div>`).join('')}
                    </div>
                    
                    <div class="flex flex-wrap gap-1 mt-3">
                        ${(p.sizes||[]).map(sz => `<button onclick="updateSel(${p.id},'size','${sz}',this)" class="size-btn ${s.size===sz?'selected':''}">${sz}</button>`).join('')}
                    </div>

                    <div class="qty-control">
                        <button onclick="changeQty(${p.id},-1)" class="qty-btn">-</button>
                        <span id="qty-${p.id}" class="text-sm font-bold">${s.qty}</span>
                        <button onclick="changeQty(${p.id},1)" class="qty-btn">+</button>
                    </div>

                    <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-3 rounded-xl mt-3 text-xs font-bold">إضافة للسلة</button>
                </div>`;
            }).join('');
        }

        window.updateSel = (id, key, val, el) => {
            window.selections[id][key] = val;
            el.parentElement.querySelectorAll('.selected').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.changeQty = (id, d) => {
            window.selections[id].qty = Math.max(1, window.selections[id].qty + d);
            document.getElementById(`qty-${id}`).innerText = window.selections[id].qty;
        };

        window.addToCart = (id) => {
            const p = products.find(x => x.id === id);
            cart.push({...p, ...window.selections[id], cartId: Date.now()});
            updateCartUI();
            toggleCart(true);
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `<div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center">
                    <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow text-[11px]">
                        <div class="font-bold">${item.name}</div>
                        <div class="text-gray-400">الكمية: ${item.qty} | المقاس: ${item.size}</div>
                    </div>
                    <button onclick="remove(${item.cartId})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.remove = (cid) => { cart = cart.filter(x => x.cartId !== cid); updateCartUI(); };

        window.toggleCart = (show) => {
            const side = document.getElementById('cart-sidebar');
            if(show === true) side.classList.remove('translate-x-full');
            else if(show === false) side.classList.add('translate-x-full');
            else side.classList.toggle('translate-x-full');
        };

        window.openImg = (src) => {
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').style.display = 'flex';
        };

        window.closeImageModal = () => document.getElementById('image-modal').style.display = 'none';

        window.handleSearch = () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
        };

        window.filterProducts = (cat, e) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            renderProducts(cat === 'all' ? products : products.filter(p => p.category === cat));
        };

        window.sendWhatsApp = () => {
            if(!cart.length) return;
            let msg = "🚀 *طلب جديد من متجر الماس*\n\n";
            cart.forEach((it, i) => msg += `${i+1}. ${it.name}\nالكمية: ${it.qty} | المقاس: ${it.size}\n\n`);
            msg += `💰 الإجمالي: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        };

        start();
    </script>
</body>
</html>
