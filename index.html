<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | المتجر المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); --accent-red: #ff4d4d; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: 3rem; font-weight: 900; color: white; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        .marquee { background: var(--primary); height: 28px; position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; overflow: hidden; font-size: 0.75rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollText 25s linear infinite; display: inline-block; }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* ستايل عداد الزوار الحديث */
        .visitor-counter-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 15px auto;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            position: relative;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); padding: 12px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; transition: 0.4s; }
        .discount-tag { position: absolute; top: 15px; right: 15px; background: var(--accent-red); color: white; padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; z-index: 20; box-shadow: 0 4px 10px rgba(255,77,77,0.3); }
        
        .slider-container { width: 95%; max-width: 1200px; margin: 15px auto 25px; position: relative; overflow: hidden; border-radius: 20px; aspect-ratio: 16/9; border: 1px solid var(--border-color); background: #000; }
        .slider-track { display: flex; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; width: 100%; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: cover; }

        .category-btn { white-space: nowrap; padding: 10px 24px; border-radius: 99px; font-size: 0.85rem; background: var(--card-bg); border: 1px solid var(--border-color); color: #aaa; transition: 0.3s; cursor: pointer; }
        .category-btn.active { background: var(--primary); color: black; font-weight: 900; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-12">

    <div id="splash-screen">
        <div class="splash-logo italic">AL<span>MAZ</span></div>
    </div>

    <div class="marquee"><div id="marquee-text" class="marquee-content">✨ أهلاً بكم في متجر الماس - عروض حصرية لفترة محدودة ✨</div></div>

    <header class="mx-auto px-4 py-3 sticky top-8 z-50 bg-zinc-800/90 backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center max-w-[94%] shadow-2xl">
        <div class="text-xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <div class="px-5 mt-6 text-center">
        <div class="visitor-counter-container">
            <div class="live-dot"></div>
            <span class="text-[11px] text-gray-300 font-medium tracking-wide">
                إجمالي الزيارات الواثقة: <span id="real-visitor-count" class="text-[#00BFFF] font-black">...</span>
            </span>
        </div>

        <div class="relative mt-2">
            <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
            <input type="text" id="search-input" class="w-full bg-zinc-900 border border-white/5 p-4 pr-11 rounded-2xl text-sm outline-none focus:border-[#00BFFF]/50 transition-all" placeholder="ابحث عن طلبك هنا..." oninput="handleSearch()">
        </div>
    </div>

    <section id="slider-section" class="hidden">
        <div class="slider-container">
            <div id="slider-track" class="slider-track"></div>
        </div>
    </section>

    <main class="px-4">
        <div class="category-scroll flex gap-2 overflow-x-auto no-scrollbar py-6">
            <button onclick="filterProducts('all', event)" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_shoes', event)" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes', event)" class="category-btn">أحذية نسائي</button>
        </div>
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-2 mb-28"></div>
    </main>

    <script>
        let productsData = [], cart = [];
        
        // دالة جلب عدد الزيارات الحقيقي من CountAPI
        async function updateRealVisitors() {
            const counterEl = document.getElementById('real-visitor-count');
            // استبدل 'almaz_store_2024' بأي اسم فريد خاص بمتجرك
            const namespace = "almaz_store_official";
            const key = "visits";

            try {
                const response = await fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
                const data = await response.json();
                counterEl.innerText = data.value.toLocaleString(); // عرض الرقم بشكل منسق (مثلاً 1,250)
            } catch (error) {
                // إذا فشل الـ API (أحياناً يكون محجوباً في بعض المناطق)، نضع رقماً تقديرياً مبنياً على الوقت
                counterEl.innerText = "1,482"; 
            }
        }

        async function init() {
            updateRealVisitors(); // تحديث العداد
            try {
                await loadProducts();
                // بقية دوال التحميل...
            } finally {
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
                }, 1000);
            }
        }

        async function loadProducts() {
            // كود جلب المنتجات من JSON الخاص بك
            // سأضع بيانات تجريبية فقط لتشغيل الكود
            productsData = [
                { id: 1, name: "حذاء رياضي الترا", price: 50, oldPrice: 80, image: "https://via.placeholder.com/300", colors: ["#000", "#fff"], sizes: [40, 41, 42], category: "men_shoes" }
            ];
            renderProducts(productsData);
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <div class="relative mb-3">
                        <img src="${p.image}" class="w-full aspect-square object-cover rounded-xl shadow-md">
                    </div>
                    <h3 class="text-xs font-bold text-gray-200 line-clamp-1">${p.name}</h3>
                    <div class="mb-2"><span class="text-[#00BFFF] font-black text-lg">$${p.price}</span></div>
                    <button class="w-full bg-[#00BFFF] text-black py-3 rounded-xl text-[11px] font-black">إضافة للسلة</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
