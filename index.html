<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #FF7F00; --bg-dark: #050505; --card-bg: #111111; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #splash-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; letter-spacing: -2px; opacity: 0; transform: scale(0.8); animation: introLogo 2s forwards; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }
        @keyframes introLogo { 0% { opacity: 0; transform: scale(0.8) blur(10px); } 100% { opacity: 1; transform: scale(1) blur(0px); filter: drop-shadow(0 0 20px rgba(255,127,0,0.5)); } }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid #1a1a1a; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(255,127,0,0.1); }

        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 15px; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 99px; font-size: 0.8rem; border: 1px solid #222; color: #888; transition: 0.3s; scroll-snap-align: start; cursor: pointer; }
        .category-btn.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 800; box-shadow: 0 5px 15px rgba(255,127,0,0.2); }

        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; text-transform: uppercase; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .option-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; position: relative; }
        .option-dot.selected { border-color: white; box-shadow: 0 0 10px var(--primary); }
        .option-dot.selected::after { content:'✓'; color:white; font-size:10px; position:absolute; inset:0; display:flex; items-center; justify-content:center; }

        .size-btn { text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #888; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 9px; font-weight: 500; }
        .size-btn.selected { background: white; color: black; font-weight: 800; border-color: white; }

        .badge-new { position: absolute; top: 10px; left: 10px; background: var(--primary); color: black; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 6px; z-index: 10; box-shadow: 0 4px 10px rgba(255,127,0,0.3); }
        .badge-discount { position: absolute; top: 10px; right: 10px; background: #10b981; color: white; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 6px; z-index: 10; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-10 no-scrollbar overflow-x-hidden">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-orange-500 w-0" style="animation: loadSplash 2.2s forwards cubic-bezier(0.65, 0, 0.35, 1)"></div>
        </div>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت للرجالي والنسائي والأحذية • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-black/80 backdrop-blur-xl rounded-2xl border border-white/5 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-orange-500">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 transition active:scale-90 hover:bg-orange-500 group">
            <i data-lucide="shopping-cart" class="text-orange-500 w-5 h-5 group-hover:text-black transition"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-10">
        <div class="category-scroll mb-10">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="product-grid mb-24">
            <p class="col-span-4 text-center text-gray-700 py-20 italic">جاري تحميل تشكيلة Almaz الحديثة...</p>
        </div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[420px] bg-black/95 backdrop-blur-3xl z-50 translate-x-full transition-transform duration-500 ease-in-out p-6 flex flex-col border-r border-white/5 shadow-3xl">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h2 class="text-2xl font-black text-orange-500 uppercase tracking-tighter italic">حقيبة التسوق</h2>
            <button id="close-cart" class="p-2.5 bg-white/5 rounded-full transition hover:bg-red-500/20"><i data-lucide="x" class="text-white"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-5 no-scrollbar pr-1"></div>
        <div class="pt-8 mt-6 border-t border-white/10">
            <div class="flex justify-between mb-5 font-black text-2xl tracking-tight"><span>الإجمالي:</span><span id="cart-total" class="text-orange-500">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-orange-500 text-black py-5 rounded-xl font-black transition active:scale-95 shadow-xl text-lg">إرسال الطلب عبر واتساب ✅</button>
        </div>
    </div>

    <div id="image-viewer" onclick="this.classList.remove('active')" class="fixed inset-0 bg-black/95 z-[200] hidden items-center justify-center backdrop-blur-md">
        <img id="viewer-img" class="max-w-[95%] max-h-[85vh] rounded-2xl shadow-3xl border border-white/10">
    </div>

    <script>
        let productsData = [];
        let cart = [];
        window.tempSelections = {}; 

        async function fetchProducts() {
            try {
                // الربط مع GitHub أو الملف المحلي
                const response = await fetch('products.json'); 
                if (!response.ok) throw new Error();
                productsData = await response.json();
                renderProducts('all');
            } catch (e) {
                document.getElementById('products-grid').innerHTML = "<p class='col-span-4 text-center text-orange-500 py-20 font-bold'>⚠️ فشل في تحميل المنتجات.</p>";
            }
        }

        window.addEventListener('load', () => {
            lucide.createIcons();
            fetchProducts();
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.visibility = 'hidden', 800);
            }, 2500);
        });

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? productsData : productsData.filter(p => p.category === filter);

            filtered.forEach(p => {
                if (!window.tempSelections[p.id]) window.tempSelections[p.id] = { color: p.colors[0], size: p.sizes[0] };
                
                const hasDiscount = p.oldPrice && p.oldPrice > p.price;
                const discPercent = hasDiscount ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
                const displayImg = Array.isArray(p.image) ? p.image[0] : p.image;

                grid.innerHTML += `
                    <div class="product-card p-3.5 flex flex-col group">
                        ${p.isNew ? '<div class="badge-new italic">NEW</div>' : ''}
                        ${hasDiscount ? `<div class="badge-discount">-%${discPercent}</div>` : ''}
                        
                        <div class="relative overflow-hidden rounded-2xl mb-4 h-44 md:h-56 bg-neutral-900">
                            <img src="${displayImg}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110 cursor-pointer" onclick="viewImage('${displayImg}')">
                        </div>
                        
                        <h3 class="font-bold text-xs md:text-sm mb-1.5 truncate text-white/90 tracking-tight">${p.name}</h3>
                        
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-orange-500 font-black text-sm md:text-xl tracking-tighter">$${p.price}</span>
                            ${hasDiscount ? `<span class="text-gray-600 text-[10px] line-through">$${p.oldPrice}</span>` : ''}
                        </div>
                        
                        <div class="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar pb-1">
                            ${p.colors.map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="option-dot ${window.tempSelections[p.id].color===c?'selected':''}" style="background:${c}"></div>`).join('')}
                        </div>
                        
                        <div class="flex flex-wrap gap-1.5 mb-5 overflow-x-auto no-scrollbar pb-1">
                            ${p.sizes.map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="size-btn px-2.5 py-1 ${window.tempSelections[p.id].size===s?'selected':''}">${s}</button>`).join('')}
                        </div>
                        
                        <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-orange-500 text-black py-3 rounded-xl font-black text-[11px] active:scale-95 transition-transform shadow-lg shadow-orange-500/10">أضف للحقيبة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.viewImage = (src) => {
            const viewer = document.getElementById('image-viewer');
            document.getElementById('viewer-img').src = src;
            viewer.style.display = 'flex';
            setTimeout(() => viewer.classList.add('active'), 10);
        };

        window.selectOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.option-dot, .size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            cart.push({ ...p, ...window.tempSelections[id], cartId: Date.now() });
            updateUI();
        };

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0;
            content.innerHTML = cart.map(item => {
                total += item.price;
                return `
                <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/5 items-center">
                    <img src="${Array.isArray(item.image) ? item.image[0] : item.image}" class="w-16 h-16 rounded-xl object-cover border border-white/10 shadow-lg">
                    <div class="flex-grow text-[11px] space-y-1">
                        <p class="font-bold text-white text-xs truncate">${item.name}</p>
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full border border-white/10" style="background:${item.color}"></div>
                            <span class="text-gray-400 font-medium bg-white/5 px-2 py-0.5 rounded text-[9px]">${item.size}</span>
                        </div>
                        <p class="text-orange-500 font-black text-sm">$${item.price}</p>
                    </div>
                    <button onclick="cart = cart.filter(x => x.cartId !== ${item.cartId}); updateUI();" class="text-red-500 p-2.5 bg-white/5 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            if(cart.length === 0) content.innerHTML = `<div class="text-center py-20 text-gray-700 italic">حقيبة التسوق فارغة.</div>`;
            lucide.createIcons();
        }

        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderProducts(cat);
        };

        window.sendOrderToWhatsApp = () => {
            if(cart.length === 0) return alert('أضف منتجات للحقيبة أولاً!');
            let msg = "🚀 *طلب جديد من Almaz Store*\n\n";
            cart.forEach((p, i) => {
                msg += `📦 *${i+1}. ${p.name}*\n   - اللون: ${p.color}\n   - المقاس: ${p.size}\n   - السعر: $${p.price}\n\n`;
            });
            msg += `💰 *الإجمالي النهائي: $${cart.reduce((a, b) => a + b.price, 0)}*`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`, '_blank');
        };
    </script>
</body>
    </html>
