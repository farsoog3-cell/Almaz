<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #00BFFF; 
            --bg-dark: #1a1c1e; 
            --card-bg: #26292d; 
            --border-color: rgba(255,255,255,0.1);
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* السلايدر الإعلاني */
        .slider-container { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 25px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        @media (min-width: 768px) { .slider-container { height: 400px; } }
        
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .slide-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .slide-content { position: absolute; text-align: center; z-index: 5; padding: 20px; }
        .slide-title { font-size: 1.5rem; font-weight: 900; color: white; margin-bottom: 8px; transform: translateY(20px); transition: 0.5s; }
        .slide.active .slide-title { transform: translateY(0); }

        /* باقي الستايلات الأصلية */
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; animation: introLogo 2s forwards; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }
        
        .search-wrapper { max-width: 600px; margin: 10px auto 20px; padding: 0 20px; position: relative; }
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px 45px 14px 20px; border-radius: 18px; color: white; outline: none; transition: 0.3s; font-size: 0.9rem; }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,191,255,0.15); }
        .search-icon { position: absolute; right: 35px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); transition: 0.4s; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .option-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; }
        .option-dot.selected::after { content:'✓'; color:white; font-size:10px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #ccc; border-radius: 6px; padding: 4px 10px; font-size: 9px; cursor: pointer; }
        .size-btn.selected { background: white; color: black; font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-10 no-scrollbar overflow-x-hidden">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-[#00BFFF] w-0" style="animation: loadSplash 2.2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-zinc-800/90 backdrop-blur-xl rounded-2xl border border-white/5 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-6 max-w-[95%]">
        
        <div id="hero-slider" class="slider-container">
            </div>

        <div class="search-wrapper">
            <i data-lucide="search" class="search-icon w-5 h-5"></i>
            <input type="text" id="search-input" class="search-bar" placeholder="ما الذي تبحث عنه اليوم؟" oninput="handleSearch()">
        </div>

        <div class="category-scroll mb-8">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="product-grid mb-24">
            <p class="col-span-4 text-center text-gray-500 py-20 italic">جاري تحميل تشكيلة Almaz الحديثة...</p>
        </div>
    </main>

    <footer class="mt-24 py-16 border-t border-white/5 bg-black/40 text-center px-4">
        <div class="flex flex-wrap justify-center gap-10">
            <div class="flex flex-col items-center">
                <div class="bg-white p-2 rounded-2xl"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://t.me/hehehevve" class="w-24 h-24"></div>
                <p class="mt-3 text-xs font-bold text-blue-400">Telegram</p>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-2 rounded-2xl"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.facebook.com/share/18coFiPjCh/" class="w-24 h-24"></div>
                <p class="mt-3 text-xs font-bold text-blue-600">Facebook</p>
            </div>
        </div>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[420px] bg-[#1a1c1e] z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/5">
        <div class="flex justify-between items-center mb-10 pb-5 border-b border-white/10">
            <h2 class="text-xl font-black text-[#00BFFF]">حقيبة التسوق</h2>
            <button id="close-cart"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between mb-5 font-bold text-xl"><span>الإجمالي:</span><span id="cart-total">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = [];
        window.tempSelections = {};

        // مصفوفة الإعلانات (يمكنك تغييرها لاحقاً من لوحة الإدارة)
        const adsData = [
            {
                image: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200",
                title: "تشكيلة الصيف الجديدة",
                desc: "خصومات تصل إلى 40% على جميع الملابس"
            },
            {
                image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=1200",
                title: "أحذية أوريجينال",
                desc: "جودة عالمية بأسعار تنافسية"
            },
            {
                image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1200",
                title: "إكسسوارات فاخرة",
                desc: "أكمل أناقتك مع قطع الألماس المختارة"
            }
        ];

        function initSlider() {
            const slider = document.getElementById('hero-slider');
            slider.innerHTML = adsData.map((ad, index) => `
                <div class="slide ${index === 0 ? 'active' : ''}">
                    <img src="${ad.image}" class="slide-img">
                    <div class="slide-content">
                        <h2 class="slide-title">${ad.title}</h2>
                        <p class="text-sm opacity-80 mb-4">${ad.desc}</p>
                        <button class="bg-[#00BFFF] text-black px-6 py-2 rounded-full font-bold text-xs">تسوق الآن</button>
                    </div>
                </div>
            `).join('');

            let currentSlide = 0;
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 5000);
        }

        async function fetchProducts() {
            try {
                const response = await fetch('products.json?v=' + Date.now());
                productsData = await response.json();
                renderProducts(productsData);
            } catch (e) {
                console.log("Error loading JSON");
            }
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                const colors = p.colors || [];
                const sizes = p.sizes || [];
                if (!window.tempSelections[p.id]) window.tempSelections[p.id] = { color: colors[0] || 'N/A', size: sizes[0] || 'N/A' };
                
                grid.innerHTML += `
                    <div class="product-card p-3 flex flex-col">
                        <img src="${Array.isArray(p.image) ? p.image[0] : p.image}" class="w-full h-44 object-cover rounded-2xl mb-3">
                        <h3 class="text-xs font-bold mb-1 truncate">${p.name}</h3>
                        <p class="text-[#00BFFF] font-black text-lg mb-3">$${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="mt-auto w-full bg-[#00BFFF] text-black py-2.5 rounded-xl font-bold text-[10px]">أضف للحقيبة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        function handleSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = productsData.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterProducts(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'all' ? productsData : productsData.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function addToCart(id) {
            const p = productsData.find(x => x.id === id);
            cart.push({ ...p, ...window.tempSelections[id], cartId: Date.now() });
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            let total = 0;
            content.innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center text-xs">
                    <div class="flex-grow"><p class="font-bold">${item.name}</p><p class="text-[#00BFFF]">$${item.price}</p></div>
                    <button onclick="cart = cart.filter(x => x.cartId !== ${item.cartId}); updateUI();" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        function sendOrderToWhatsApp() {
            if(cart.length === 0) return;
            let msg = "طلب جديد:\n" + cart.map(i => `- ${i.name} ($${i.price})`).join('\n');
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        }

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');

        window.onload = () => {
            initSlider();
            fetchProducts();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 800);
            }, 2500);
        };
    </script>
</body>
</html>
