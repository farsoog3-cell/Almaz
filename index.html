<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #00BFFF; 
            --bg-dark: #1a1c1e; 
            --card-bg: #2a2d31; 
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* شاشة الترحيب */
        #splash-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .splash-logo { font-size: clamp(3rem, 12vw, 6rem); font-weight: 900; color: white; text-transform: uppercase; animation: introLogo 2.5s ease-out forwards; letter-spacing: -2px; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px rgba(0,191,255,0.5); }
        
        @keyframes introLogo { 
            0% { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(10px); }
            50% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
            100% { transform: scale(1.05); }
        }

        /* شريط التحميل السفلي */
        .loader-bar { width: 180px; h: 2px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 2rem; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; left: 0; top: 0; height: 100%; background: var(--primary); width: 0; animation: loadProgress 2.5s ease-in-out forwards; }
        @keyframes loadProgress { 0% { width: 0; } 100% { width: 100%; } }

        /* الشبكة والتصنيفات */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        /* شريط الإعلان */
        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .category-btn { white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 99px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); color: #ccc; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .category-btn.active { background: var(--primary); color: black; font-weight: 800; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-10 no-scrollbar overflow-x-hidden">

    <audio id="startup-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="splash-screen">
        <div class="splash-logo italic">AL<span>MAZ</span></div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        <p class="mt-6 text-[9px] text-gray-500 uppercase tracking-[0.5em] animate-pulse">جاري تحضير الفخامة...</p>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-[#2a2d31]/80 backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 active:scale-90 transition group">
            <i data-lucide="shopping-cart" class="text-[#00BFFF] w-5 h-5 group-hover:text-black"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-10">
        <div class="flex overflow-x-auto gap-3 mb-10 no-scrollbar pb-2">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
        </div>
        <div id="products-grid" class="product-grid mb-24"></div>
    </main>

    <footer class="mt-24 py-20 bg-[#151719] text-center px-4">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="flex flex-col items-center">
                <div class="bg-white p-3 rounded-3xl shadow-2xl mb-4">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://t.me/hehehevve" class="w-32 h-32">
                </div>
                <span class="text-[#00BFFF] text-xs font-bold tracking-widest uppercase">Telegram Channel</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-3 rounded-3xl shadow-2xl mb-4 border-b-4 border-blue-600">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.facebook.com/share/18coFiPjCh/" class="w-32 h-32">
                </div>
                <span class="text-blue-500 text-xs font-bold tracking-widest uppercase">Facebook Store</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-3 rounded-3xl shadow-2xl mb-4 border-b-4 border-blue-900">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.facebook.com/share/1CDeh3LeQ5/" class="w-32 h-32">
                </div>
                <span class="text-blue-900 text-xs font-bold tracking-widest uppercase">Manager Account</span>
            </div>
        </div>
        <p class="mt-20 opacity-20 text-[10px] tracking-[0.8em]">ALMAZ STORE 2026</p>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-[400px] bg-[#1a1c1e]/98 backdrop-blur-2xl z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col border-r border-white/10">
        <div class="flex justify-between items-center mb-10 pb-5 border-b border-white/5">
            <h2 class="text-xl font-black text-[#00BFFF] italic">الحقيبة</h2>
            <button id="close-cart"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-6 border-t border-white/5">
            <div class="flex justify-between mb-6 font-black text-xl"><span>الإجمالي:</span><span id="cart-total" class="text-[#00BFFF]">₺0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-2xl font-black shadow-lg">إرسال الطلب عبر واتساب ✅</button>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = [];

        // تشغيل الصوت بذكاء
        function startExperience() {
            const sound = document.getElementById('startup-sound');
            sound.volume = 0.5;
            sound.play().catch(() => {});
            
            // إخفاء الشاشة بعد انتهاء التحميل
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.1)';
                setTimeout(() => splash.style.visibility = 'hidden', 1000);
                document.body.style.overflow = 'auto';
            }, 2500);
        }

        // تفعيل الصوت عند أول لمسة للشاشة (ضروري للمتصفحات)
        window.addEventListener('touchstart', startExperience, { once: true });
        window.addEventListener('mousedown', startExperience, { once: true });

        async function fetchProducts() {
            try {
                const res = await fetch('products.json?v=' + Date.now());
                productsData = await res.json();
                renderProducts('all');
            } catch (e) {
                document.getElementById('products-grid').innerHTML = "<p class='col-span-2 text-center py-20 text-[#00BFFF]'>⚠️ يرجى إضافة ملف products.json</p>";
            }
        }

        function renderProducts(filter) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const items = filter === 'all' ? productsData : productsData.filter(p => p.category === filter);
            
            items.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card p-3">
                        <img src="${Array.isArray(p.image) ? p.image[0] : p.image}" class="w-full h-48 object-cover rounded-2xl mb-4">
                        <h3 class="text-xs font-bold mb-2 truncate">${p.name}</h3>
                        <p class="text-[#00BFFF] font-black mb-4">₺${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-2.5 rounded-xl text-[10px] font-bold">أضف للحقيبة</button>
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = productsData.find(x => x.id === id);
            cart.push({...p, cartId: Date.now()});
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const content = document.getElementById('cart-content');
            content.innerHTML = cart.map(item => `
                <div class="flex gap-4 bg-white/5 p-3 rounded-2xl border border-white/5 items-center">
                    <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow text-[10px]">
                        <p class="font-bold">${item.name}</p>
                        <p class="text-[#00BFFF]">₺${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = `₺${cart.reduce((s, i) => s + i.price, 0)}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) {
            cart = cart.filter(x => x.cartId !== cid);
            updateUI();
        }

        function sendOrderToWhatsApp() {
            if(!cart.length) return;
            let msg = "🚀 طلب جديد من Almaz:\n\n" + cart.map(i => `- ${i.name} (₺${i.price})`).join('\n');
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        }

        window.onload = () => {
            lucide.createIcons();
            fetchProducts();
            // بدء تلقائي إذا كان المتصفح يسمح
            setTimeout(startExperience, 100);
        };

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
    </script>
</body>
</html>
