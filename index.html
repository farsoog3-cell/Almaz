<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | متجر الألماس الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* التعديل هنا: تم استبدال الأسود باللون الرمادي المستخرج من الصورة */
        :root { 
            --primary: #FF7F00; 
            --bg-dark: #6b6b6b; /* الرمادي المطلوب */
            --card-bg: #7a7a7a; /* رمادي أفتح قليلاً للكروت */
            --header-bg: rgba(90, 90, 90, 0.85);
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* شاشة الترحيب */
        #splash-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: white; text-transform: uppercase; animation: introLogo 2s forwards; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary); }
        @keyframes introLogo { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* الشبكة والكروت */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }

        /* التصنيفات */
        .category-btn { white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 99px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); color: #eee; transition: 0.3s; cursor: pointer; background: rgba(0,0,0,0.1); }
        .category-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 800; }

        /* العارض */
        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(50,50,50,0.98); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(15px); flex-direction: column; }
        #image-viewer.active { display: flex; }

        .marquee { background: var(--primary); height: 26px; position: fixed; top: 0; width: 100%; z-index: 50; display: flex; align-items: center; overflow: hidden; font-size: 0.7rem; font-weight: 900; color: white; }
        .marquee-content { white-space: nowrap; animation: scrollMarquee 25s linear infinite; }
        @keyframes scrollMarquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* السلة الجانبية */
        #cart-sidebar { 
            fixed top: 0; left: 0; h-full; w-full; md:w-[420px]; 
            background: #5a5a5a; /* لون متناسق مع الخلفية */
            backdrop-blur-3xl; z-50; translate-x-full; transition-transform duration-500; p-6; 
            border-r border-white/10; shadow-3xl;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-10 no-scrollbar overflow-x-hidden">

    <div id="splash-screen">
        <div class="splash-logo tracking-tighter italic">AL<span>MAZ</span></div>
        <div class="w-40 h-1 bg-white/10 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-orange-500 w-0" style="animation: loadSplash 2.2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div class="marquee-content font-black">✨ شحن فوري لجميع الولايات • تشكيلة العيد الجديدة وصلت • جودة ألماس مضمونة ✨</div></div>

    <header class="container mx-auto px-4 py-3 sticky top-6 z-40 bg-[var(--header-bg)] backdrop-blur-xl rounded-2xl border border-white/10 flex justify-between items-center mt-2 max-w-[95%] shadow-2xl">
        <div class="text-2xl font-black uppercase tracking-tighter italic">AL<span class="text-orange-500">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2.5 bg-white/5 rounded-full border border-white/10 transition active:scale-90 hover:bg-orange-500 group">
            <i data-lucide="shopping-cart" class="text-orange-500 w-5 h-5 group-hover:text-white"></i>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-white text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <main class="container mx-auto px-4 mt-10">
        <div class="category-scroll flex overflow-x-auto gap-2 mb-10 no-scrollbar">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
        </div>

        <div id="products-grid" class="product-grid mb-24">
            </div>
    </main>

    <footer class="mt-24 py-20 border-t border-white/10 bg-[rgba(0,0,0,0.1)] text-center px-4 relative">
        <h3 class="text-orange-500 font-bold text-xs uppercase tracking-[0.4em] mb-16 relative z-10">مسح الرمز للتواصل المباشر</h3>
        
        <div class="flex flex-wrap justify-center gap-8 md:gap-16 max-w-6xl mx-auto relative z-10">
            <div class="flex flex-col items-center">
                <div class="qr-box bg-white p-3 rounded-2xl border-b-8 border-blue-500 hover:scale-105 transition shadow-2xl">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/hehehevve" class="w-[130px] h-[130px]" alt="Telegram QR">
                </div>
                <div class="mt-5 text-white/80 font-bold text-xs">تلغرام (Almaz)</div>
            </div>
            </div>
        <p class="mt-24 opacity-40 text-[10px] tracking-[0.6em] font-medium">© 2026 ALMAZ STORE - PREMIUM QUALITY COLLECTION</p>
    </footer>

    <script>
        // ... (أبقِ على نفس كود الجافا سكربت الخاص بك دون تغيير لتشغيل السلة والمنتجات)
    </script>
</body>
</html>
