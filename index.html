<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Almaz Store | المتجر المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #00BFFF; --bg-dark: #1a1c1e; --card-bg: #26292d; --border-color: rgba(255,255,255,0.1); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* شاشة التحميل */
        #splash-screen { position: fixed; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { font-size: 3rem; font-weight: 900; color: white; animation: intro 2s forwards; }
        .splash-logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        /* تأثيرات السلايدر المتطورة */
        .slider-container { width: 95%; max-width: 1200px; margin: 10px auto 25px; position: relative; overflow: hidden; border-radius: 20px; aspect-ratio: 16/8; border: 1px solid var(--border-color); background: #000; }
        .slider-track { display: flex; height: 100%; width: 100%; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; transition: opacity 0.8s ease; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        
        /* خيارات التلاشي والحركة */
        .effect-fade { opacity: 0; }
        .effect-fade.active { opacity: 1; }
        .effect-zoom { transform: scale(1.2); opacity: 0; }
        .effect-zoom.active { transform: scale(1); opacity: 1; }
        .effect-blur { filter: blur(10px); opacity: 0; }
        .effect-blur.active { filter: blur(0); opacity: 1; }

        .slide-content { position: absolute; bottom: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; backdrop-filter: blur(8px); border-right: 4px solid var(--primary); }
        
        /* المنتجات والأقسام */
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { white-space: nowrap; padding: 10px 20px; border-radius: 15px; font-size: 0.8rem; background: var(--card-bg); border: 1px solid var(--border-color); color: #aaa; transition: 0.3s; }
        .category-btn.active { background: var(--primary); color: black; font-weight: 900; box-shadow: 0 0 15px rgba(0,191,255,0.3); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); padding: 10px; transition: 0.3s; }
        
        .option-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; }
        .option-dot.selected { border-color: white; transform: scale(1.1); }
        .size-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 8px; font-size: 10px; min-width: 35px; }
        .size-btn.selected { background: white; color: black; font-weight: 900; }

        /* الشريط العلوي */
        .marquee { background: var(--primary); height: 28px; position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; overflow: hidden; font-size: 0.75rem; font-weight: 900; color: black; }
        .marquee-content { white-space: nowrap; animation: scrollText 20s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="pt-12">

    <div id="splash-screen">
        <div class="splash-logo italic">AL<span>MAZ</span></div>
        <div class="w-32 h-1 bg-white/10 mt-4 rounded-full overflow-hidden">
            <div class="h-full bg-[#00BFFF] w-0" style="animation: load 2s forwards"></div>
        </div>
    </div>

    <div class="marquee"><div id="marquee-text" class="marquee-content font-black">جاري تحميل أحدث العروض... ✨</div></div>

    <header class="mx-auto px-4 py-3 sticky top-8 z-40 bg-zinc-800/80 backdrop-blur-lg rounded-2xl border border-white/5 flex justify-between items-center max-w-[92%] shadow-xl">
        <div class="text-xl font-black italic">AL<span class="text-[#00BFFF]">MAZ</span></div>
        <button id="toggle-cart" class="relative p-2 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="shopping-bag" class="text-[#00BFFF] w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
    </header>

    <section id="slider-section" class="hidden">
        <div class="slider-container">
            <div id="slider-track" class="slider-track"></div>
            <div class="slider-dots absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </div>
    </section>

    <main class="px-4">
        <div class="category-scroll no-scrollbar">
            <button onclick="filterProducts('all')" class="category-btn active">الكل</button>
            <button onclick="filterProducts('men_clothing')" class="category-btn">ملابس رجالي</button>
            <button onclick="filterProducts('women_clothing')" class="category-btn">ملابس نسائي</button>
            <button onclick="filterProducts('men_shoes')" class="category-btn">أحذية رجالي</button>
            <button onclick="filterProducts('women_shoes')" class="category-btn">أحذية نسائي</button>
            <button onclick="filterProducts('sport_shoes')" class="category-btn">رياضي</button>
        </div>

        <div id="products-grid" class="product-grid mt-6 mb-24"></div>
    </main>

    <div id="cart-sidebar" class="fixed top-0 left-0 h-full w-full md:w-96 bg-zinc-900 z-50 translate-x-full transition-transform duration-500 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-lg font-black text-[#00BFFF]">حقيبة الطلبات</h2>
            <button id="close-cart" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="pt-4 border-t border-white/10">
            <div class="flex justify-between mb-4 font-black text-lg"><span>الإجمالي:</span><span id="cart-total" class="text-[#00BFFF]">$0</span></div>
            <button onclick="sendOrderToWhatsApp()" class="w-full bg-[#00BFFF] text-black py-4 rounded-xl font-black">تأكيد الطلب واتساب ✅</button>
        </div>
    </div>

    <div id="image-viewer">
        <button onclick="this.parentElement.style.display='none'" class="absolute top-10 right-10 text-white"><i data-lucide="x" class="w-8 h-8"></i></button>
        <img id="viewer-img" class="max-w-[90%] max-h-[70vh] rounded-2xl">
    </div>

    <script>
        let productsData = [], cart = [];
        window.tempSelections = {};

        // 1. تحميل الإعدادات (نص الشريط العلوي)
        async function loadSettings() {
            try {
                const res = await fetch('settings.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('marquee-text').innerText = data.marquee;
            } catch (e) { console.log("Default settings used"); }
        }

        // 2. تحميل السلايدر مع التأثيرات المختارة
        async function loadSlides() {
            try {
                const res = await fetch('slides.json?v=' + Date.now());
                const slides = await res.json();
                if (slides.length > 0) {
                    const track = document.getElementById('slider-track');
                    document.getElementById('slider-section').classList.remove('hidden');
                    
                    slides.forEach((s, i) => {
                        // إضافة كلاس التأثير المختار من لوحة التحكم
                        const effectClass = s.effect === 'fade' ? 'effect-fade' : s.effect === 'zoom' ? 'effect-zoom' : s.effect === 'blur' ? 'effect-blur' : '';
                        track.innerHTML += `
                            <div class="slide ${effectClass} ${i===0?'active':''}">
                                <img src="${s.image}">
                                <div class="slide-content">
                                    <h2 class="text-sm font-black text-white">${s.title || ''}</h2>
                                    <p class="text-[9px] text-[#00BFFF] font-bold">${s.desc || ''}</p>
                                </div>
                            </div>`;
                    });
                    startSlider(slides.length);
                }
            } catch (e) {}
        }

        function startSlider(total) {
            let current = 0;
            const slides = document.querySelectorAll('.slide');
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % total;
                slides[current].classList.add('active');
                // إذا كان التأثير "Slide" العادي نحرك الـ Track
                const track = document.getElementById('slider-track');
                track.style.transform = `translateX(${current * 100}%)`;
            }, 5000);
        }

        // 3. تحميل المنتجات ودعم "النمر"
        async function loadProducts() {
            try {
                const res = await fetch('products.json?v=' + Date.now());
                productsData = await res.json();
                renderProducts(productsData);
            } catch (e) {}
        }

        function renderProducts(data) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                if (!window.tempSelections[p.id]) {
                    window.tempSelections[p.id] = { color: p.colors?.[0] || 'default', size: p.sizes?.[0] || 'N/A', qty: 1 };
                }
                const imgs = Array.isArray(p.image) ? p.image : [p.image];
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${imgs[0]}" onclick="viewImage('${imgs[0]}')" class="w-full h-40 object-cover rounded-xl mb-3">
                        <h3 class="font-bold text-[10px] mb-1 truncate">${p.name}</h3>
                        <div class="text-[#00BFFF] font-black text-sm mb-2">$${p.price}</div>
                        <div class="flex gap-1 mb-2 overflow-x-auto no-scrollbar">
                            ${(p.colors || []).map(c => `<div onclick="selectOpt(${p.id},'color','${c}',this)" class="option-dot" style="background:${c}"></div>`).join('')}
                        </div>
                        <div class="flex flex-wrap gap-1 mb-3">
                            ${(p.sizes || []).map(s => `<button onclick="selectOpt(${p.id},'size','${s}',this)" class="size-btn">${s}</button>`).join('')}
                        </div>
                        <button onclick="addToCart(${p.id})" class="w-full bg-[#00BFFF] text-black py-2 rounded-lg font-black text-[10px]">إضافة للسلة</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.selectOpt = (id, type, val, el) => {
            window.tempSelections[id][type] = val;
            el.parentElement.querySelectorAll('.option-dot, .size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.addToCart = (id) => {
            const p = productsData.find(x => x.id === id);
            const sel = window.tempSelections[id];
            cart.push({ ...p, ...sel, cartId: Date.now() });
            updateCartUI();
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cont = document.getElementById('cart-content');
            let total = 0; cont.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                cont.innerHTML += `
                <div class="flex gap-3 bg-white/5 p-3 rounded-xl items-center">
                    <img src="${Array.isArray(item.image)?item.image[0]:item.image}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-grow">
                        <p class="text-[10px] font-bold">${item.name}</p>
                        <p class="text-[9px] text-gray-400">${item.size} | ${item.color}</p>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            });
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        window.removeFromCart = (cid) => { cart = cart.filter(x => x.cartId !== cid); updateCartUI(); };

        window.sendOrderToWhatsApp = () => {
            let msg = "🚀 طلب جديد من Almaz:\n\n";
            cart.forEach(p => msg += `• ${p.name} (مقاس: ${p.size} | لون: ${p.color})\n`);
            msg += `\n💰 الإجمالي: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/905394753724?text=${encodeURIComponent(msg)}`);
        };

        window.filterProducts = (cat) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'all' ? productsData : productsData.filter(p => p.category === cat);
            renderProducts(filtered);
        };

        window.viewImage = (url) => {
            const viewer = document.getElementById('image-viewer');
            document.getElementById('viewer-img').src = url;
            viewer.style.display = 'flex';
        };

        window.addEventListener('load', () => {
            loadSettings(); loadSlides(); loadProducts();
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2500);
        });

        document.getElementById('toggle-cart').onclick = () => document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-sidebar').classList.add('translate-x-full');
    </script>
</body>
</html>
